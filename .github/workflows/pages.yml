# Deploys the static wrapper page (kindoo.csnorth.org) to GitHub Pages
# from the `website/` folder. Replaces the previous "Deploy from a branch
# / main / /docs" branch-deploy mode — switched to GitHub Actions because
# branch-deploy supports only `/` or `/docs` as source folders, and we
# wanted website resources tracked in their own directory.
#
# The Pages source mode must be set to "GitHub Actions" in the repo's
# Settings → Pages for this workflow to take effect.

name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
