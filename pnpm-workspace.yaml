# pnpm workspace manifest. Lists every package directory pnpm should treat
# as a workspace member. Glob patterns expand at install-time; missing dirs
# are silently ignored, so it's fine for `apps/*` to currently contain only
# `apps/web/`.
packages:
  - 'apps/*'
  - 'functions'
  - 'firestore'
  - 'packages/*'
  - 'e2e'
  - 'infra'
