<!--
  Stake Presidency Roster (Chunks 5 + 7).

  Mirrors bishopric/Roster.html but scoped to the stake pool. Scope is
  hard-coded server-side to 'stake'; Auth_requireRole('stake') is what
  keeps bishoprics out.

  Chunk 7: X/trashcan on manual/temp rows submits a `remove` Request
  via the shared ApiRequests_submit endpoint with scope='stake'. Auto
  rows render no X (importer-owned). Pending-remove rows render a
  disabled X with a "removal pending" badge; the server enforces the
  same rule defensively.
-->
<section class="roster-page">
  <div class="roster-header">
    <h1>Stake Roster</h1>
    <span class="roster-scope-label">Stake pool</span>
  </div>
  <div id="utilization-host"></div>
  <div id="roster-table-host">Loading…</div>

  <div id="remove-modal" class="remove-modal hidden" role="dialog" aria-modal="true">
    <div class="remove-modal-inner">
      <h2 id="rm-title">Remove access</h2>
      <div id="rm-summary" class="remove-modal-summary"></div>
      <form id="rm-form">
        <div class="form-row">
          <label><strong>Reason for removal</strong> (required, sent to managers)<br>
            <textarea id="rm-reason" rows="3" required></textarea>
          </label>
        </div>
        <div class="form-actions">
          <button type="button" id="rm-cancel-btn"  class="btn btn-secondary">Cancel</button>
          <button type="submit" id="rm-submit-btn"  class="btn btn-danger">Submit removal request</button>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
(function () {
  function $(id) { return document.getElementById(id); }

  var rowsBySeatId = {};

  function refresh() {
    $('roster-table-host').innerHTML = 'Loading…';
    rpc('ApiStake_roster').then(function (resp) {
      $('utilization-host').innerHTML = renderUtilizationBar(resp.summary);
      rowsBySeatId = {};
      for (var i = 0; i < resp.rows.length; i++) {
        rowsBySeatId[resp.rows[i].seat_id] = resp.rows[i];
      }
      $('roster-table-host').innerHTML = renderRosterTable(resp.rows, {
        emptyMsg: 'No seats in the stake pool yet. Run the importer or submit a request from "New Kindoo Request".',
        actionsHeader: 'Remove',
        rowActions: function (row) {
          if (row.type === 'auto') return '';
          if (row.removal_pending) {
            return '<span class="remove-disabled" title="A removal request is already pending for this row">⌫</span>';
          }
          return '<button class="btn btn-icon btn-remove" data-seat-remove="' +
            escapeHtml(row.seat_id) + '" title="Request removal of this seat">⌫</button>';
        }
      });
      Array.prototype.forEach.call(
        $('roster-table-host').querySelectorAll('button[data-seat-remove]'),
        function (btn) {
          btn.addEventListener('click', function () {
            openRemoveModal(btn.getAttribute('data-seat-remove'));
          });
        }
      );
    }).catch(function (err) {
      var msg = (err && err.message) ? err.message : String(err);
      $('roster-table-host').innerHTML =
        '<div class="error">Could not load roster: ' + escapeHtml(msg) + '</div>';
    });
  }

  function openRemoveModal(seatId) {
    var row = rowsBySeatId[seatId];
    if (!row) {
      toast('Seat not found in the current view.', 'error');
      return;
    }
    var personLine = (row.person_name ? escapeHtml(row.person_name) + ' — ' : '') +
      '<span class="roster-email">' + escapeHtml(row.person_email) + '</span>';
    $('rm-title').innerHTML = 'Remove access for ' + (row.person_name ? escapeHtml(row.person_name) : escapeHtml(row.person_email)) + '?';
    var dates = '';
    if (row.type === 'temp') {
      dates = '<div class="queue-field"><span class="label">Dates:</span> ' +
        escapeHtml(row.start_date || '?') + ' → ' + escapeHtml(row.end_date || '?') + '</div>';
    }
    $('rm-summary').innerHTML =
      '<div class="queue-field"><span class="label">Person:</span> ' + personLine + '</div>' +
      '<div class="queue-field"><span class="label">Type:</span> ' + escapeHtml(row.type) + '</div>' +
      '<div class="queue-field"><span class="label">Reason on file:</span> ' +
        escapeHtml(row.reason || '(none)') + '</div>' +
      dates +
      (row.building_names
        ? '<div class="queue-field"><span class="label">Buildings:</span> ' +
            escapeHtml(row.building_names) + '</div>'
        : '');
    $('rm-reason').value = '';
    $('remove-modal').setAttribute('data-seat-id', seatId);
    $('remove-modal').classList.remove('hidden');
    $('rm-submit-btn').disabled = false;
    setTimeout(function () { $('rm-reason').focus(); }, 50);
  }

  function closeRemoveModal() {
    $('remove-modal').classList.add('hidden');
    $('remove-modal').removeAttribute('data-seat-id');
  }

  $('rm-cancel-btn').addEventListener('click', closeRemoveModal);
  $('remove-modal').addEventListener('click', function (ev) {
    if (ev.target === this) closeRemoveModal();
  });
  $('rm-form').addEventListener('submit', function (ev) {
    ev.preventDefault();
    var seatId = $('remove-modal').getAttribute('data-seat-id');
    if (!seatId) return;
    var row = rowsBySeatId[seatId];
    if (!row) {
      toast('Seat not found.', 'error');
      closeRemoveModal();
      return;
    }
    var reason = $('rm-reason').value.trim();
    if (!reason) {
      toast('A reason is required.', 'error');
      return;
    }
    var draft = {
      type:         'remove',
      target_email: row.person_email,
      target_name:  row.person_name || '',
      reason:       reason
    };
    $('rm-submit-btn').disabled = true;
    rpc('ApiRequests_submit', draft, 'stake').then(function (resp) {
      toast('Removal request submitted.', 'success');
      if (resp && resp.warning) toast(resp.warning, 'warn');
      closeRemoveModal();
      refresh();
    }).catch(function (err) {
      toast(err.message || String(err), 'error');
      $('rm-submit-btn').disabled = false;
    });
  });

  refresh();
})();
</script>
