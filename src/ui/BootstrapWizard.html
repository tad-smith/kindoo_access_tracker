<!--
  First-run setup wizard (Chunk 4). Rendered to the bootstrap admin only,
  only while Config.setup_complete is FALSE. After the Complete Setup
  button flips the flag, the server-side gate in ApiShared_bootstrap no
  longer routes here — attempting to revisit this template bounces back
  to the normal role-resolution path (manager dashboard for the admin,
  since they're auto-added to KindooManagers during setup).

  State model:
    - `state` holds the last-known server state (refreshed on every rpc).
    - `pending` is client-only: a per-step array of new rows the user has
      added via the form but not yet committed. Add-row forms push into
      `pending`; every navigation action (step-bar button, Back, Next,
      Complete Setup) auto-commits the current step's pending rows via
      the ApiBootstrap_*BulkInsert endpoint, then navigates. Validation
      failures abort the commit with a toast — pending rows stay in the
      list so the user can fix and retry. Closing the browser with
      pending rows loses them (window.onbeforeunload surfaces a generic
      warning).

  Steps:
    1. Stake name + callings-sheet ID + stake seat cap (writes to Config).
    2. At least one Building (writes to Buildings).
    3. At least one Ward (writes to Wards; form has a Buildings dropdown).
    4. Additional Kindoo Managers (optional; writes to KindooManagers).
       The bootstrap admin is auto-added on entry — they can't delete
       themselves here.

  Free navigation between completed steps for editing; Complete Setup
  button is enabled only when state.canFinish (= steps 1-3 all complete,
  i.e. at least one committed Building and Ward, and the three Step-1
  Config keys filled). Pending-but-uncommitted rows do not count toward
  completion — the server is the source of truth.
-->
<section class="bootstrap-wizard">
  <h1>Set up Kindoo Access Tracker</h1>
  <p class="wizard-intro">
    This four-step wizard configures your stake for the first time. You can
    go back to any completed step to edit; Add buttons queue rows locally,
    and everything in a step is saved in one write when you navigate
    forward, back, or click Complete Setup.
  </p>

  <nav class="wizard-steps" id="wizard-steps" role="tablist"></nav>
  <div class="wizard-panel" id="wizard-panel">Loading…</div>

  <div class="wizard-finish" id="wizard-finish"></div>
</section>

<script>
(function () {
  var state = null;
  var currentView = 1;  // which step the user is currently viewing

  // Pending rows accumulated in the browser, not yet written to the Sheet.
  // Keyed by step; each step flushes via its Api*BulkInsert endpoint on
  // navigation. Survives state refreshes (those come from server rpcs that
  // don't know about pending). Cleared only on successful commit.
  var pending = {
    buildings: [],  // [{ building_name, address }, ...]
    wards:     [],  // [{ ward_code, ward_name, building_name, seat_cap }, ...]
    managers:  []   // [{ email, name, active }, ...]
  };

  function $(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function hasAnyPending() {
    return pending.buildings.length + pending.wards.length + pending.managers.length > 0;
  }
  function pendingCountForStep(n) {
    if (n === 2) return pending.buildings.length;
    if (n === 3) return pending.wards.length;
    if (n === 4) return pending.managers.length;
    return 0;
  }

  // Warn the user if they try to close/reload the page with uncommitted rows.
  // Modern browsers display a generic message regardless of returnValue text,
  // but the property must be set non-empty for the prompt to appear.
  window.addEventListener('beforeunload', function (e) {
    if (hasAnyPending()) {
      e.preventDefault();
      e.returnValue = 'You have unsaved rows. Leave without saving?';
      return e.returnValue;
    }
  });

  function refresh() {
    return rpc('ApiBootstrap_getState').then(function (resp) {
      state = resp;
      if (currentView == null) currentView = state.currentStep;
      render();
    }).catch(function (err) { toast(err.message, 'error'); });
  }

  // Commit pending rows for step N via the appropriate BulkInsert rpc.
  // Returns a Promise that resolves with the new state on success, rejects
  // on failure (caller is responsible for toasting). If the step has
  // nothing pending, resolves immediately with the current state.
  function commitPendingForStep(n) {
    if (n === 2 && pending.buildings.length > 0) {
      var rows = pending.buildings.slice();
      return rpc('ApiBootstrap_buildingsBulkInsert', rows).then(function (resp) {
        pending.buildings = [];
        state = resp;
        return resp;
      });
    }
    if (n === 3 && pending.wards.length > 0) {
      var rows = pending.wards.slice();
      return rpc('ApiBootstrap_wardsBulkInsert', rows).then(function (resp) {
        pending.wards = [];
        state = resp;
        return resp;
      });
    }
    if (n === 4 && pending.managers.length > 0) {
      var rows = pending.managers.slice();
      return rpc('ApiBootstrap_kindooManagersBulkInsert', rows).then(function (resp) {
        pending.managers = [];
        state = resp;
        return resp;
      });
    }
    return Promise.resolve(state);
  }

  // Nav helper: commit current step's pending (if any) then move to `target`.
  // `target` can be a step number (1..4). On commit failure, toast and stay.
  function commitAndGoTo(target) {
    commitPendingForStep(currentView).then(function () {
      currentView = target;
      render();
    }).catch(function (err) { toast(err.message, 'error'); });
  }

  function render() {
    renderStepsBar();
    renderPanel();
    renderFinish();
  }

  function renderStepsBar() {
    var s = state;
    var labels = [
      { n: 1, label: 'Stake info', complete: s.step1.complete },
      { n: 2, label: 'Buildings',  complete: s.step2.complete },
      { n: 3, label: 'Wards',      complete: s.step3.complete },
      { n: 4, label: 'Managers',   complete: true /* optional step */ }
    ];
    var html = '';
    for (var i = 0; i < labels.length; i++) {
      var step = labels[i];
      var cls = 'wizard-step';
      if (currentView === step.n) cls += ' active';
      if (step.complete && step.n <= 3) cls += ' complete';
      var pendingCount = pendingCountForStep(step.n);
      html += '<button class="' + cls + '" data-step="' + step.n + '">' +
        '<span class="wizard-step-num">' + step.n + '</span>' +
        '<span class="wizard-step-label">' + esc(step.label) + '</span>' +
        (step.complete && step.n <= 3 ? '<span class="wizard-step-check">✓</span>' : '') +
        (pendingCount > 0 ? '<span class="wizard-step-pending">' + pendingCount + ' unsaved</span>' : '') +
        '</button>';
    }
    $('wizard-steps').innerHTML = html;
    Array.prototype.forEach.call(
      $('wizard-steps').querySelectorAll('.wizard-step'),
      function (btn) {
        btn.addEventListener('click', function () {
          var target = Number(btn.getAttribute('data-step'));
          if (target === currentView) return;
          commitAndGoTo(target);
        });
      }
    );
  }

  function renderPanel() {
    switch (currentView) {
      case 1: renderStep1(); break;
      case 2: renderStep2(); break;
      case 3: renderStep3(); break;
      case 4: renderStep4(); break;
    }
  }

  function renderFinish() {
    var canFinish = state.canFinish;
    var blockers = [];
    if (!state.step1.complete) blockers.push('Stake info');
    if (!state.step2.complete) blockers.push('at least one Building');
    if (!state.step3.complete) blockers.push('at least one Ward');
    var pendingNote = hasAnyPending()
      ? ' (Complete Setup will save ' +
        [pending.buildings.length && pending.buildings.length + ' building' + (pending.buildings.length === 1 ? '' : 's'),
         pending.wards.length     && pending.wards.length     + ' ward'     + (pending.wards.length     === 1 ? '' : 's'),
         pending.managers.length  && pending.managers.length  + ' manager'  + (pending.managers.length  === 1 ? '' : 's')]
          .filter(Boolean).join(', ') +
        ' first.)'
      : '';
    var note = canFinish
      ? 'When you\'re ready, click below to finish setup. The wizard will ' +
        'install the daily expiry and weekly import triggers, mark setup as ' +
        'complete, and take you to the manager dashboard.' + pendingNote
      : 'Still needed before you can finish: ' + blockers.join(', ') + '.';
    $('wizard-finish').innerHTML =
      '<div class="wizard-finish-card">' +
        '<p>' + esc(note) + '</p>' +
        '<button class="btn wizard-complete-btn" id="wizard-complete-btn"' +
          (canFinish ? '' : ' disabled') + '>' +
          'Complete Setup' +
        '</button>' +
      '</div>';
    if (canFinish) {
      $('wizard-complete-btn').addEventListener('click', function () {
        if (!confirm('Finish setup? After this, the wizard is one-shot — ' +
                     'further edits go through the normal Configuration page.')) return;
        $('wizard-complete-btn').disabled = true;
        // Flush all pending across all steps in order before completing.
        commitPendingForStep(2)
          .then(function () { return commitPendingForStep(3); })
          .then(function () { return commitPendingForStep(4); })
          .then(function () { return rpc('ApiBootstrap_complete'); })
          .then(function (resp) {
            // Clear pending so beforeunload doesn't prompt on the redirect.
            pending = { buildings: [], wards: [], managers: [] };
            var target = (resp && resp.redirect) || (typeof MAIN_URL === 'string' ? MAIN_URL : '');
            renderCompleteSuccess(target);
            // Try the programmatic redirect first — it works when the
            // browser still considers the gesture "live." If the
            // navigation is silently blocked (common once an async rpc
            // chain intervenes), the user sees the visible link rendered
            // above and clicks it. The click carries fresh user
            // activation and reliably escapes the iframe via <base
            // target="_top"> in Layout.html.
            if (target) {
              try { window.top.location.replace(target); } catch (e) {}
            }
          })
          .catch(function (err) {
            $('wizard-complete-btn').disabled = false;
            toast(err.message, 'error');
            render();  // redraw so unsaved counts reflect any partial commit
          });
      });
    }
  }

  // ---------------------------------------------------------------------------
  // Step 1 — Stake info (single atomic write, no pending state needed)
  // ---------------------------------------------------------------------------
  function renderStep1() {
    var s1 = state.step1;
    var html =
      '<h2>Step 1 · Stake information</h2>' +
      '<p class="wizard-step-intro">' +
        'Basics the rest of the app needs. The callings-sheet ID is the ' +
        '<code>&lt;ID&gt;</code> segment of your LCR-exported callings ' +
        'spreadsheet\'s URL (<code>docs.google.com/spreadsheets/d/&lt;ID&gt;/edit</code>). ' +
        'You can paste it now even if the sheet isn\'t shared yet — the ' +
        'importer will surface access errors later.' +
      '</p>' +
      '<div class="wizard-form">' +
        '<label>Stake name</label>' +
          '<input type="text" id="s1-name" value="' + esc(s1.stake_name) + '" placeholder="CS North Stake">' +
        '<label>Callings-sheet ID</label>' +
          '<input type="text" id="s1-sheet" value="' + esc(s1.callings_sheet_id) + '" placeholder="1aBcDe…">' +
        '<label>Stake seat cap</label>' +
          '<input type="number" id="s1-cap" value="' + esc(s1.stake_seat_cap) + '" placeholder="15" min="1" step="1">' +
      '</div>' +
      '<div class="wizard-actions">' +
        '<button class="btn" id="s1-save">Save &amp; continue</button>' +
      '</div>';
    $('wizard-panel').innerHTML = html;
    $('s1-save').addEventListener('click', function () {
      var payload = {
        stake_name:        $('s1-name').value.trim(),
        callings_sheet_id: $('s1-sheet').value.trim(),
        stake_seat_cap:    Number($('s1-cap').value)
      };
      rpc('ApiBootstrap_step1Submit', payload).then(function (resp) {
        state = resp;
        toast('Saved.', 'success');
        currentView = state.step2.complete ? (state.step3.complete ? 4 : 3) : 2;
        render();
      }).catch(function (err) { toast(err.message, 'error'); });
    });
  }

  // ---------------------------------------------------------------------------
  // Step 2 — Buildings (saved rows editable/deletable with single rpc;
  // new rows queue into pending.buildings until flushed on navigation).
  // ---------------------------------------------------------------------------
  function renderStep2() {
    var saved   = state.step2.buildings;
    var unsaved = pending.buildings;
    var html =
      '<h2>Step 2 · Buildings' + pendingBadge(unsaved.length) + '</h2>' +
      '<p class="wizard-step-intro">' +
        'Add at least one building. Wards will be assigned to a building ' +
        'in the next step. Each "Add" queues a row locally; clicking ' +
        'Back, Next, a step tab, or Complete Setup saves the whole batch ' +
        'in a single write.' +
      '</p>';
    if (saved.length === 0 && unsaved.length === 0) {
      html += '<div class="empty-state">No buildings yet. Add one below.</div>';
    } else {
      html += '<table class="config-table"><thead><tr>' +
        '<th>building_name</th><th>address</th><th>status</th>' +
        '<th class="row-actions">Actions</th></tr></thead><tbody>';
      // Saved rows first, editable inline.
      for (var i = 0; i < saved.length; i++) {
        var r = saved[i];
        html += '<tr data-saved="1" data-key="' + esc(r.building_name) + '">' +
          '<td><input type="text" data-field="building_name" value="' + esc(r.building_name) + '"></td>' +
          '<td><input type="text" data-field="address" value="' + esc(r.address) + '"></td>' +
          '<td><span class="saved-badge">saved</span></td>' +
          '<td class="row-actions">' +
            '<button class="btn" data-act="save">Save</button> ' +
            '<button class="btn btn-danger" data-act="delete">Delete</button>' +
          '</td></tr>';
      }
      // Then pending (read-only display + discard).
      for (var j = 0; j < unsaved.length; j++) {
        var p = unsaved[j];
        html += '<tr data-pending="' + j + '" class="pending-row">' +
          '<td>' + esc(p.building_name) + '</td>' +
          '<td>' + esc(p.address) + '</td>' +
          '<td><span class="pending-badge">unsaved</span></td>' +
          '<td class="row-actions">' +
            '<button class="btn btn-secondary" data-act="discard">Discard</button>' +
          '</td></tr>';
      }
      html += '</tbody></table>';
    }
    html +=
      '<div class="add-row-form"><h3>Add a building</h3><div class="form-grid" style="grid-template-columns:160px 1fr;">' +
      '<label>building_name</label><input type="text" id="add-b-name" placeholder="Stake Center">' +
      '<label>address</label><input type="text" id="add-b-addr" placeholder="12345 Powers Blvd">' +
      '</div><div class="form-actions"><button class="btn" id="add-b-btn">Add to list</button></div></div>' +
      '<div class="wizard-actions">' +
        '<button class="btn btn-secondary" data-nav="1">Back</button>' +
        navNextButton(2, state.step2.complete || unsaved.length > 0) +
      '</div>';
    $('wizard-panel').innerHTML = html;

    Array.prototype.forEach.call($('wizard-panel').querySelectorAll('tr[data-saved="1"]'), function (tr) {
      tr.querySelector('button[data-act="save"]').addEventListener('click', function () {
        var key = tr.getAttribute('data-key');
        var patch = {
          building_name: tr.querySelector('input[data-field="building_name"]').value.trim(),
          address:       tr.querySelector('input[data-field="address"]').value
        };
        if (patch.building_name !== key) {
          if (!confirm('Renaming building from "' + key + '" to "' + patch.building_name + '" will break references in Wards. Continue?')) return;
        }
        rpc('ApiBootstrap_buildingsUpsert', patch).then(function (resp) {
          state = resp; toast('Saved.', 'success'); render();
        }).catch(function (err) { toast(err.message, 'error'); });
      });
      tr.querySelector('button[data-act="delete"]').addEventListener('click', function () {
        var key = tr.getAttribute('data-key');
        if (!confirm('Delete building "' + key + '"?')) return;
        rpc('ApiBootstrap_buildingsDelete', key).then(function (resp) {
          state = resp; toast('Deleted.', 'success'); render();
        }).catch(function (err) { toast(err.message, 'error'); });
      });
    });
    Array.prototype.forEach.call($('wizard-panel').querySelectorAll('tr[data-pending]'), function (tr) {
      tr.querySelector('button[data-act="discard"]').addEventListener('click', function () {
        var idx = Number(tr.getAttribute('data-pending'));
        pending.buildings.splice(idx, 1);
        render();
      });
    });
    $('add-b-btn').addEventListener('click', function () {
      var name = $('add-b-name').value.trim();
      if (!name) { toast('building_name is required.', 'warn'); return; }
      // Client-side dup check (against both saved and pending) so the user
      // sees the problem immediately rather than on commit. The server
      // re-validates in case of a race.
      if (findByField(state.step2.buildings, 'building_name', name) ||
          findByField(pending.buildings, 'building_name', name)) {
        toast('A building named "' + name + '" is already in the list.', 'warn');
        return;
      }
      pending.buildings.push({ building_name: name, address: $('add-b-addr').value });
      $('add-b-name').value = '';
      $('add-b-addr').value = '';
      render();
    });
    wireNavButtons();
  }

  // ---------------------------------------------------------------------------
  // Step 3 — Wards (same pattern: saved rows inline, pending queued locally)
  // ---------------------------------------------------------------------------
  function renderStep3() {
    var saved   = state.step3.wards;
    var unsaved = pending.wards;
    var buildings = state.step3.buildings;
    var buildingNames = buildings.map(function (b) { return b.building_name; });
    var html =
      '<h2>Step 3 · Wards' + pendingBadge(unsaved.length) + '</h2>' +
      '<p class="wizard-step-intro">' +
        'Add at least one ward. <code>ward_code</code> is the 2-character ' +
        'code that must match the ward\'s tab name in the callings ' +
        'spreadsheet. Rows queue locally and save together on navigation.' +
      '</p>';
    if (buildings.length === 0) {
      html += '<div class="empty-state">' +
        'You need at least one saved Building before adding wards — ' +
        '<a href="#" data-nav="2">go back to Step 2</a>.' +
        '</div>';
    }
    if (saved.length === 0 && unsaved.length === 0) {
      html += '<div class="empty-state">No wards yet. Add one below.</div>';
    } else {
      html += '<table class="config-table"><thead><tr>' +
        '<th>ward_code</th><th>ward_name</th><th>building</th>' +
        '<th>seat_cap</th><th>status</th><th class="row-actions">Actions</th>' +
        '</tr></thead><tbody>';
      for (var i = 0; i < saved.length; i++) {
        var r = saved[i];
        html += '<tr data-saved="1" data-key="' + esc(r.ward_code) + '">' +
          '<td><input type="text" data-field="ward_code" maxlength="2" value="' + esc(r.ward_code) + '"></td>' +
          '<td><input type="text" data-field="ward_name" value="' + esc(r.ward_name) + '"></td>' +
          '<td>' + buildingSelect_(buildingNames, r.building_name, 'data-field="building_name"') + '</td>' +
          '<td><input type="number" data-field="seat_cap" value="' + esc(r.seat_cap == null ? '' : r.seat_cap) + '"></td>' +
          '<td><span class="saved-badge">saved</span></td>' +
          '<td class="row-actions">' +
            '<button class="btn" data-act="save">Save</button> ' +
            '<button class="btn btn-danger" data-act="delete">Delete</button>' +
          '</td></tr>';
      }
      for (var j = 0; j < unsaved.length; j++) {
        var p = unsaved[j];
        html += '<tr data-pending="' + j + '" class="pending-row">' +
          '<td>' + esc(p.ward_code) + '</td>' +
          '<td>' + esc(p.ward_name) + '</td>' +
          '<td>' + esc(p.building_name) + '</td>' +
          '<td>' + esc(p.seat_cap) + '</td>' +
          '<td><span class="pending-badge">unsaved</span></td>' +
          '<td class="row-actions">' +
            '<button class="btn btn-secondary" data-act="discard">Discard</button>' +
          '</td></tr>';
      }
      html += '</tbody></table>';
    }
    var addBuildingSelect = buildingNames.length === 0
      ? '<div class="empty-state" style="text-align:left;">Add a saved building first (Step 2).</div>'
      : buildingSelect_(buildingNames, '', 'id="add-w-bldg"');
    html +=
      '<div class="add-row-form"><h3>Add a ward</h3><div class="form-grid" style="grid-template-columns:160px 1fr;">' +
      '<label>ward_code (2 chars)</label><input type="text" id="add-w-code" maxlength="2" placeholder="CO">' +
      '<label>ward_name</label><input type="text" id="add-w-name" placeholder="Cordera 1st Ward">' +
      '<label>building</label>' + addBuildingSelect +
      '<label>seat_cap</label><input type="number" id="add-w-cap" placeholder="20" min="1" step="1">' +
      '</div><div class="form-actions"><button class="btn" id="add-w-btn"' +
        (buildingNames.length === 0 ? ' disabled' : '') + '>Add to list</button></div></div>' +
      '<div class="wizard-actions">' +
        '<button class="btn btn-secondary" data-nav="2">Back</button>' +
        navNextButton(3, state.step3.complete || unsaved.length > 0) +
      '</div>';
    $('wizard-panel').innerHTML = html;

    Array.prototype.forEach.call($('wizard-panel').querySelectorAll('tr[data-saved="1"]'), function (tr) {
      tr.querySelector('button[data-act="save"]').addEventListener('click', function () {
        var key = tr.getAttribute('data-key');
        var patch = {
          ward_code:     tr.querySelector('input[data-field="ward_code"]').value.trim(),
          ward_name:     tr.querySelector('input[data-field="ward_name"]').value,
          building_name: tr.querySelector('select[data-field="building_name"]').value,
          seat_cap:      Number(tr.querySelector('input[data-field="seat_cap"]').value)
        };
        if (patch.ward_code !== key) {
          if (!confirm('Renaming ward_code from "' + key + '" to "' + patch.ward_code + '" will break references downstream. Continue?')) return;
        }
        rpc('ApiBootstrap_wardsUpsert', patch).then(function (resp) {
          state = resp; toast('Saved.', 'success'); render();
        }).catch(function (err) { toast(err.message, 'error'); });
      });
      tr.querySelector('button[data-act="delete"]').addEventListener('click', function () {
        var key = tr.getAttribute('data-key');
        if (!confirm('Delete ward "' + key + '"?')) return;
        rpc('ApiBootstrap_wardsDelete', key).then(function (resp) {
          state = resp; toast('Deleted.', 'success'); render();
        }).catch(function (err) { toast(err.message, 'error'); });
      });
    });
    Array.prototype.forEach.call($('wizard-panel').querySelectorAll('tr[data-pending]'), function (tr) {
      tr.querySelector('button[data-act="discard"]').addEventListener('click', function () {
        var idx = Number(tr.getAttribute('data-pending'));
        pending.wards.splice(idx, 1);
        render();
      });
    });
    var addBtn = $('add-w-btn');
    if (addBtn) {
      addBtn.addEventListener('click', function () {
        var row = {
          ward_code:     $('add-w-code').value.trim(),
          ward_name:     $('add-w-name').value.trim(),
          building_name: $('add-w-bldg').value,
          seat_cap:      Number($('add-w-cap').value)
        };
        if (!row.ward_code || !row.ward_name || !row.building_name || !row.seat_cap) {
          toast('All fields required.', 'warn');
          return;
        }
        if (row.ward_code.length !== 2) {
          toast('ward_code must be exactly 2 characters.', 'warn');
          return;
        }
        if (findByField(state.step3.wards, 'ward_code', row.ward_code) ||
            findByField(pending.wards, 'ward_code', row.ward_code)) {
          toast('A ward with ward_code "' + row.ward_code + '" is already in the list.', 'warn');
          return;
        }
        pending.wards.push(row);
        $('add-w-code').value = '';
        $('add-w-name').value = '';
        $('add-w-cap').value = '';
        render();
      });
    }
    wireNavButtons();
  }

  // ---------------------------------------------------------------------------
  // Step 4 — Additional Kindoo Managers
  // ---------------------------------------------------------------------------
  function renderStep4() {
    var saved   = state.step4.managers;
    var unsaved = pending.managers;
    var selfCanonical = canonicaliseEmail_(state.email);
    var html =
      '<h2>Step 4 · Kindoo Managers <span class="wizard-step-optional">(optional)</span>' + pendingBadge(unsaved.length) + '</h2>' +
      '<p class="wizard-step-intro">' +
        'You (<code>' + esc(state.email) + '</code>) are already added as a ' +
        'Kindoo Manager. Queue additional managers here — they save as a ' +
        'batch on navigation (or when you click Complete Setup).' +
      '</p>';
    if (saved.length === 0 && unsaved.length === 0) {
      html += '<div class="empty-state">No managers yet (unexpected — you should have been auto-added).</div>';
    } else {
      html += '<table class="config-table"><thead><tr>' +
        '<th>email</th><th>name</th><th>active</th><th>status</th>' +
        '<th class="row-actions">Actions</th></tr></thead><tbody>';
      for (var i = 0; i < saved.length; i++) {
        var r = saved[i];
        var isSelf = canonicaliseEmail_(r.email) === selfCanonical;
        html += '<tr data-saved="1" data-key="' + esc(r.email) + '"' + (isSelf ? ' data-self="1"' : '') + '>' +
          '<td><input type="email" data-field="email" value="' + esc(r.email) + '"' + (isSelf ? ' readonly' : '') + '>' +
            (isSelf ? ' <span class="config-readonly-badge">you</span>' : '') + '</td>' +
          '<td><input type="text"  data-field="name"  value="' + esc(r.name) + '"></td>' +
          '<td><input type="checkbox" data-field="active"' + (r.active ? ' checked' : '') + (isSelf ? ' disabled' : '') + '></td>' +
          '<td><span class="saved-badge">saved</span></td>' +
          '<td class="row-actions">' +
            '<button class="btn" data-act="save">Save</button> ' +
            (isSelf ? '' : '<button class="btn btn-danger" data-act="delete">Delete</button>') +
          '</td></tr>';
      }
      for (var j = 0; j < unsaved.length; j++) {
        var p = unsaved[j];
        html += '<tr data-pending="' + j + '" class="pending-row">' +
          '<td>' + esc(p.email) + '</td>' +
          '<td>' + esc(p.name) + '</td>' +
          '<td>' + (p.active ? '✓' : '✗') + '</td>' +
          '<td><span class="pending-badge">unsaved</span></td>' +
          '<td class="row-actions">' +
            '<button class="btn btn-secondary" data-act="discard">Discard</button>' +
          '</td></tr>';
      }
      html += '</tbody></table>';
    }
    html +=
      '<div class="add-row-form"><h3>Add a Kindoo Manager</h3><div class="form-grid" style="grid-template-columns:160px 1fr;">' +
      '<label>email</label><input type="email" id="add-m-email" placeholder="alice@example.com">' +
      '<label>name</label><input type="text" id="add-m-name" placeholder="Alice Smith">' +
      '<label>active</label><div><input type="checkbox" id="add-m-active" checked></div>' +
      '</div><div class="form-actions"><button class="btn" id="add-m-btn">Add to list</button></div></div>' +
      '<div class="wizard-actions">' +
        '<button class="btn btn-secondary" data-nav="3">Back</button>' +
      '</div>';
    $('wizard-panel').innerHTML = html;

    Array.prototype.forEach.call($('wizard-panel').querySelectorAll('tr[data-saved="1"]'), function (tr) {
      var isSelf = tr.getAttribute('data-self') === '1';
      tr.querySelector('button[data-act="save"]').addEventListener('click', function () {
        var key = tr.getAttribute('data-key');
        var patch = {
          email:  tr.querySelector('input[data-field="email"]').value.trim(),
          name:   tr.querySelector('input[data-field="name"]').value,
          active: tr.querySelector('input[data-field="active"]').checked
        };
        if (isSelf) { patch.email = key; patch.active = true; }
        rpc('ApiBootstrap_kindooManagersUpsert', patch).then(function (resp) {
          state = resp; toast('Saved.', 'success'); render();
        }).catch(function (err) { toast(err.message, 'error'); });
      });
      var delBtn = tr.querySelector('button[data-act="delete"]');
      if (delBtn) {
        delBtn.addEventListener('click', function () {
          var key = tr.getAttribute('data-key');
          if (!confirm('Delete Kindoo Manager "' + key + '"?')) return;
          rpc('ApiBootstrap_kindooManagersDelete', key).then(function (resp) {
            state = resp; toast('Deleted.', 'success'); render();
          }).catch(function (err) { toast(err.message, 'error'); });
        });
      }
    });
    Array.prototype.forEach.call($('wizard-panel').querySelectorAll('tr[data-pending]'), function (tr) {
      tr.querySelector('button[data-act="discard"]').addEventListener('click', function () {
        var idx = Number(tr.getAttribute('data-pending'));
        pending.managers.splice(idx, 1);
        render();
      });
    });
    $('add-m-btn').addEventListener('click', function () {
      var email = $('add-m-email').value.trim();
      if (!email) { toast('email is required.', 'warn'); return; }
      var canon = canonicaliseEmail_(email);
      if (canon === selfCanonical) {
        toast('You are already added as a manager — no need to re-enter yourself.', 'warn');
        return;
      }
      // Dup-check against saved AND pending on canonical form.
      var dup = false;
      for (var k = 0; k < state.step4.managers.length && !dup; k++) {
        if (canonicaliseEmail_(state.step4.managers[k].email) === canon) dup = true;
      }
      for (var l = 0; l < pending.managers.length && !dup; l++) {
        if (canonicaliseEmail_(pending.managers[l].email) === canon) dup = true;
      }
      if (dup) { toast('That manager is already in the list.', 'warn'); return; }
      pending.managers.push({
        email:  email,
        name:   $('add-m-name').value.trim(),
        active: $('add-m-active').checked
      });
      $('add-m-email').value = '';
      $('add-m-name').value = '';
      $('add-m-active').checked = true;
      render();
    });
    wireNavButtons();
  }

  // Replaces the whole wizard UI with a success panel after
  // Complete Setup succeeds. Always shows a clickable link — modern
  // browsers silently block programmatic top-frame navigation from
  // inside the HtmlService iframe once the user-gesture is lost
  // across the rpc chain, so the manual link is the reliable path.
  // The try'd window.top.location.replace() above covers the fast
  // case where the gesture is still live.
  function renderCompleteSuccess(target) {
    var href = target || '';
    $('wizard-steps').innerHTML = '';
    $('wizard-finish').innerHTML = '';
    $('wizard-panel').innerHTML =
      '<div class="wizard-success">' +
        '<h2>Setup complete</h2>' +
        '<p>Kindoo Access Tracker is now configured for your stake. ' +
          'Click below to continue to the app — you\'ll land on the ' +
          'manager dashboard since you\'re a Kindoo Manager.</p>' +
        (href
          ? '<p><a class="btn wizard-continue-btn" target="_top" href="' + esc(href) + '">Continue to the app</a></p>'
          : '<p class="error">main_url is not configured — open the Sheet\'s Config tab and set it.</p>') +
      '</div>';
  }

  // ---------------------------------------------------------------------------
  // Helpers
  // ---------------------------------------------------------------------------

  function pendingBadge(n) {
    if (!n) return '';
    return ' <span class="wizard-step-pending">' + n + ' unsaved</span>';
  }

  // The "Next" button. Enabled when the step has something real to save
  // (either already-saved rows count toward completion, OR there are
  // pending rows that will count after commit).
  function navNextButton(currentStep, enabled) {
    var target = currentStep + 1;
    return '<button class="btn" data-nav="' + target + '"' +
      (enabled ? '' : ' disabled') + '>Next</button>';
  }

  // Wire data-nav="<step>" buttons to commit-and-navigate.
  function wireNavButtons() {
    Array.prototype.forEach.call(
      $('wizard-panel').querySelectorAll('[data-nav]'),
      function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          if (btn.disabled) return;
          commitAndGoTo(Number(btn.getAttribute('data-nav')));
        });
      }
    );
  }

  function findByField(arr, field, value) {
    for (var i = 0; i < arr.length; i++) {
      if (arr[i][field] === value) return arr[i];
    }
    return null;
  }

  // Client-side canonicalisation — mirrors Utils_normaliseEmail server-side
  // (D4 / open-questions.md I-8). Used for dup-prevention in the UI; the
  // server still validates on commit.
  function canonicaliseEmail_(email) {
    var s = String(email || '').trim().toLowerCase();
    if (!s) return '';
    var at = s.indexOf('@');
    if (at === -1) return s;
    var local = s.substring(0, at);
    var domain = s.substring(at + 1);
    if (domain === 'gmail.com' || domain === 'googlemail.com') {
      var plus = local.indexOf('+');
      if (plus !== -1) local = local.substring(0, plus);
      local = local.replace(/\./g, '');
      domain = 'gmail.com';
    }
    return local + '@' + domain;
  }

  // Building-name <select> builder; mirrors the Chunk-2 Config page helper.
  function buildingSelect_(buildingNames, current, extraAttrs) {
    var html = '<select ' + (extraAttrs || '') + '>';
    var matched = false;
    if (!current) html += '<option value="">— select —</option>';
    for (var i = 0; i < buildingNames.length; i++) {
      var b = buildingNames[i];
      var sel = (b === current) ? ' selected' : '';
      if (b === current) matched = true;
      html += '<option value="' + esc(b) + '"' + sel + '>' + esc(b) + '</option>';
    }
    if (current && !matched) {
      html += '<option value="' + esc(current) + '" selected>' + esc(current) + ' (missing)</option>';
    }
    html += '</select>';
    return html;
  }

  // Boot.
  currentView = null;
  refresh();
})();
</script>
