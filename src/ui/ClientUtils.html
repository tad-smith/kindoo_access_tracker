<!--
  Shared client JS. Two responsibilities:

    rpc(funcName, ...args)
      Promise wrapper around google.script.run that auto-injects
      sessionStorage.jwt as the first argument. Layout.html handles the
      AuthExpired/AuthInvalid recovery in the .catch handler — every page
      using rpc() can do the same.
      Don't scatter raw google.script.run calls; they'll skip JWT injection.

    toast(msg, kind?)
      Tiny non-blocking notifications. kind ∈ {'info','success','warn','error'}.
      Auto-dismiss after a few seconds; multiple toasts stack. Used by the
      manager Config page (Chunk 2) and by every later chunk.
-->
<script>
  function rpc(funcName) {
    var rest = Array.prototype.slice.call(arguments, 1);
    var jwt = sessionStorage.getItem('jwt') || '';
    return new Promise(function (resolve, reject) {
      var runner = google.script.run
        .withSuccessHandler(function (result) { resolve(result); })
        .withFailureHandler(function (err) {
          var msg = (err && err.message) ? err.message : String(err);
          reject(new Error(msg));
        });
      runner[funcName].apply(runner, [jwt].concat(rest));
    });
  }

  // HTML escaping for user-supplied strings. Chunk-5 roster rendering and
  // every future chunk that renders dynamic rows routes string interpolation
  // through this so pages don't have to keep redefining their own `esc`.
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // Utilization bar for Chunk-5 roster pages. `summary` is whatever the
  // ApiXxx_roster endpoints return in their .summary field
  // (total_seats, seat_cap, utilization_pct, over_cap, ward_name). Handles
  // the cap-missing case (renders a neutral "N seats" label without a
  // progress bar) so ward rows with seat_cap unset don't break.
  function renderUtilizationBar(summary) {
    if (!summary) return '';
    var total = Number(summary.total_seats) || 0;
    var cap   = summary.seat_cap == null ? null : Number(summary.seat_cap);
    if (cap == null || isNaN(cap) || cap <= 0) {
      return '<div class="utilization">' +
        '<div class="utilization-label">' +
          '<span>' + total + ' seat' + (total === 1 ? '' : 's') + '</span>' +
          '<span>(cap unset)</span>' +
        '</div></div>';
    }
    var pct = Math.min(100, Math.round((total / cap) * 100));
    var fillClass = 'utilization-fill';
    if (summary.over_cap) fillClass += ' over';
    else if (total / cap >= 0.9) fillClass += ' near';
    var overFlag = summary.over_cap
      ? '<span class="over-cap-flag">OVER CAP</span>'
      : '';
    return '<div class="utilization">' +
      '<div class="utilization-label">' +
        '<span>' + total + ' / ' + cap + ' seats used</span>' + overFlag +
      '</div>' +
      '<div class="utilization-bar">' +
        '<div class="' + fillClass + '" style="width:' + pct + '%"></div>' +
      '</div></div>';
  }

  // Single roster row → HTML <tr>. opts.showScope=true prepends a Scope
  // column (for manager AllSeats; single-scope pages omit). The row shape
  // is whatever Rosters_mapRow_ on the server returns (data-model.md Tab 8
  // projection minus internal-only fields).
  //
  // Chunk 6: opts.rowActions (optional) is a function (row) → HTML fragment
  // rendered into an extra rightmost "Actions" <td>. Callers that use
  // rowActions should also pass opts.actionsHeader (column header text) to
  // renderRosterTable so the <th> line matches the column count. The
  // manager AllSeats page uses this to render an inline "Edit" button on
  // manual/temp rows.
  //
  // Chunk 7 additions:
  //   - row.removal_pending (bool, set server-side by Rosters_mapRow_):
  //     when true, append a "Removal pending" badge in the Type cell.
  //     Caller's rowActions function should also disable the X.
  //   - opts.preview = 'remove' (string): style this row as
  //     "will be deleted on Complete" — strikethrough text + a leading
  //     ⌫ marker. Used by the manager RequestsQueue to render the
  //     current_seat for a remove-type request.
  function rosterRowHtml(row, opts) {
    opts = opts || {};
    var typeBadge =
      '<span class="roster-badge badge-type-' + escapeHtml(row.type) + '">' +
        escapeHtml(row.type) + '</span>';
    var expiryBadge = '';
    if (row.expiry_badge === 'expired') {
      expiryBadge = '<span class="roster-badge badge-expired">expired</span>';
    } else if (row.expiry_badge === 'expires_today') {
      expiryBadge = '<span class="roster-badge badge-expires-today">expires today</span>';
    }
    var removalBadge = '';
    if (row.removal_pending) {
      removalBadge = '<span class="roster-badge badge-removal-pending" title="A removal request for this person is pending a Kindoo Manager">removal pending</span>';
    }
    var scopeCell = opts.showScope
      ? '<td><code>' + escapeHtml(row.scope) + '</code></td>'
      : '';
    // Display columns and their content by type:
    //   auto   — calling_name in the "Calling / Reason" column
    //   manual — reason
    //   temp   — reason + start/end dates
    var callingOrReason = '';
    if (row.type === 'auto') {
      callingOrReason = escapeHtml(row.calling_name);
    } else {
      callingOrReason = escapeHtml(row.reason || '');
    }
    var datesCell = '';
    if (row.type === 'temp') {
      var s = row.start_date ? escapeHtml(row.start_date) : '';
      var e = row.end_date   ? escapeHtml(row.end_date)   : '';
      datesCell = s + (s && e ? ' → ' : '') + e;
    }
    var actionsCell = '';
    if (typeof opts.rowActions === 'function') {
      actionsCell = '<td class="row-actions">' + (opts.rowActions(row) || '') + '</td>';
    }
    var trClasses = 'type-' + escapeHtml(row.type);
    if (opts.preview === 'remove') trClasses += ' preview-remove';
    if (row.removal_pending)       trClasses += ' has-removal-pending';
    return '<tr class="' + trClasses + '" data-seat-id="' + escapeHtml(row.seat_id || '') + '">' +
      scopeCell +
      '<td>' + typeBadge + expiryBadge + removalBadge + '</td>' +
      '<td>' + escapeHtml(row.member_name || '') + '<br>' +
        '<span class="roster-email" title="' + escapeHtml(row.member_email) + '">' +
          escapeHtml(row.member_email) + '</span></td>' +
      '<td>' + callingOrReason + '</td>' +
      '<td>' + datesCell + '</td>' +
      '<td>' + escapeHtml(row.building_names || '') + '</td>' +
      actionsCell +
      '</tr>';
  }

  // Full table. opts.showScope (see rosterRowHtml) + opts.emptyMsg.
  // opts.rowActions / opts.actionsHeader (Chunk 6) — when set, an extra
  // rightmost column is added to the header row to match the per-row
  // <td> that rosterRowHtml emits.
  function renderRosterTable(rows, opts) {
    opts = opts || {};
    if (!rows || rows.length === 0) {
      return '<div class="roster-empty">' +
        escapeHtml(opts.emptyMsg || 'No seats in this roster.') +
        '</div>';
    }
    var headers = '';
    if (opts.showScope) headers += '<th>Scope</th>';
    headers += '<th>Type</th><th>Member</th><th>Calling / Reason</th>' +
               '<th>Dates</th><th>Buildings</th>';
    if (typeof opts.rowActions === 'function') {
      headers += '<th>' + escapeHtml(opts.actionsHeader || '') + '</th>';
    }
    var body = '';
    for (var i = 0; i < rows.length; i++) {
      body += rosterRowHtml(rows[i], opts);
    }
    var cls = 'roster-table' + (opts.wrapperClass ? ' ' + opts.wrapperClass : '');
    return '<table class="' + cls + '"><thead><tr>' + headers +
           '</tr></thead><tbody>' + body + '</tbody></table>';
  }

  // TASKS.md #2: card-per-row sibling of renderRosterTable for the five
  // primary roster pages (bishopric / stake / stake ward / manager
  // AllSeats / manager AuditLog — the audit log builds its own card
  // in-place since its shape differs). The inline preview / duplicate-
  // warning call sites on RequestsQueue + NewRequest continue to use
  // renderRosterTable — a compact table is less noisy than a nested
  // card-inside-a-card for a 1-to-few-row inline preview.
  //
  // opts matches renderRosterTable's shape (showScope, emptyMsg,
  // rowActions, preview) so page migrations are a one-line swap.
  // opts.actionsHeader is ignored — cards have no column header, the
  // rowActions fragment renders into a dedicated action strip.
  function renderRosterCards(rows, opts) {
    opts = opts || {};
    if (!rows || rows.length === 0) {
      return '<div class="roster-empty">' +
        escapeHtml(opts.emptyMsg || 'No seats in this roster.') +
        '</div>';
    }
    var cls = 'roster-cards' + (opts.wrapperClass ? ' ' + opts.wrapperClass : '');
    var html = '<div class="' + cls + '">';
    for (var i = 0; i < rows.length; i++) {
      html += rosterCardHtml(rows[i], opts);
    }
    return html + '</div>';
  }

  // Single roster row → up-to-three-line card fragment.
  //   Line 1:  badges · member (name + email in parens) ·
  //            actions (right-aligned)
  //   Line 2:  Dates: ...              (temp rows only)
  //   Line 3:  calling/reason · buildings
  //
  // Line 2 renders only for temp rows with a start_date or end_date.
  // Line 3 is suppressed when neither calling/reason nor buildings has
  // content (e.g. an auto row with no buildings). Stacked cards have
  // no gap between them — the visual density still reads as table rows
  // per TASKS.md #2's "look like table rows" constraint.
  function rosterCardHtml(row, opts) {
    opts = opts || {};
    var typeBadge =
      '<span class="roster-badge badge-type-' + escapeHtml(row.type) + '">' +
        escapeHtml(row.type) + '</span>';
    var expiryBadge = '';
    if (row.expiry_badge === 'expired') {
      expiryBadge = '<span class="roster-badge badge-expired">expired</span>';
    } else if (row.expiry_badge === 'expires_today') {
      expiryBadge = '<span class="roster-badge badge-expires-today">expires today</span>';
    }
    var removalBadge = '';
    if (row.removal_pending) {
      removalBadge = '<span class="roster-badge badge-removal-pending" title="A removal request for this person is pending a Kindoo Manager">removal pending</span>';
    }
    var scopeChip = opts.showScope
      ? '<span class="roster-card-chip roster-card-scope"><code>' + escapeHtml(row.scope) + '</code></span>'
      : '';

    // Member: "Alice Smith (alice@x.com)" when name is present,
    // bare email otherwise. Email stays in its own span so tooltips /
    // canonical-email hovercards continue to work.
    var memberInner = row.member_name
      ? '<span class="roster-card-name">' + escapeHtml(row.member_name) + '</span>' +
        ' (<span class="roster-email" title="' + escapeHtml(row.member_email) + '">' +
          escapeHtml(row.member_email) + '</span>)'
      : '<span class="roster-email" title="' + escapeHtml(row.member_email) + '">' +
          escapeHtml(row.member_email) + '</span>';
    var memberHtml = '<span class="roster-card-member">' + memberInner + '</span>';

    // "Calling" label for auto (LCR-driven); "Reason" for manual/temp
    // (human-entered). Only rendered when the underlying field has data.
    var callingChip = '';
    if (row.type === 'auto' && row.calling_name) {
      callingChip = '<span class="roster-card-chip"><span class="label">Calling:</span> ' +
        '<span class="roster-card-calling">' + escapeHtml(row.calling_name) + '</span></span>';
    } else if ((row.type === 'manual' || row.type === 'temp') && row.reason) {
      callingChip = '<span class="roster-card-chip"><span class="label">Reason:</span> ' +
        '<span class="roster-card-reason">' + escapeHtml(row.reason) + '</span></span>';
    }

    var datesLine = '';
    if (row.type === 'temp' && (row.start_date || row.end_date)) {
      var s = row.start_date ? escapeHtml(row.start_date) : '?';
      var e = row.end_date   ? escapeHtml(row.end_date)   : '?';
      datesLine =
        '<div class="roster-card-line2">' +
          '<span class="roster-card-chip"><span class="label">Dates:</span> ' +
            s + ' → ' + e +
          '</span>' +
        '</div>';
    }

    var buildingsChip = row.building_names
      ? '<span class="roster-card-chip"><span class="label">Buildings:</span> ' +
          escapeHtml(row.building_names) + '</span>'
      : '';

    var actionsBlock = '';
    if (typeof opts.rowActions === 'function') {
      var actionHtml = opts.rowActions(row) || '';
      if (actionHtml) {
        actionsBlock = '<span class="roster-card-actions">' + actionHtml + '</span>';
      }
    }

    var detailLine = (callingChip || buildingsChip)
      ? '<div class="roster-card-line2">' + callingChip + buildingsChip + '</div>'
      : '';

    var cardClasses = 'roster-card type-' + escapeHtml(row.type);
    if (opts.preview === 'remove') cardClasses += ' preview-remove';
    if (row.removal_pending)       cardClasses += ' has-removal-pending';

    return '<div class="' + cardClasses + '" data-seat-id="' + escapeHtml(row.seat_id || '') + '">' +
      '<div class="roster-card-line1">' +
        '<span class="roster-card-badges">' +
          typeBadge + expiryBadge + removalBadge + scopeChip +
        '</span>' +
        memberHtml +
        actionsBlock +
      '</div>' +
      datesLine +
      detailLine +
    '</div>';
  }

  // Themed replacements for the browser's native confirm() / alert() /
  // prompt() dialogs. Returns a Promise so callers can chain off the
  // user's choice without mutating a synchronous control-flow branch.
  //
  //   kdConfirm({title, body, confirmLabel, cancelLabel, confirmKind})
  //     → Promise<boolean>      true = confirmed, false = cancelled.
  //   kdAlert  ({title, body, confirmLabel})
  //     → Promise<void>         resolves when the user dismisses.
  //   kdPrompt ({title, body, placeholder, initialValue,
  //              confirmLabel, cancelLabel, confirmKind})
  //     → Promise<string|null>  string = submitted, null = cancelled.
  //
  // confirmKind is 'primary' (default), 'success', or 'danger' and maps
  // to the matching .btn variant so destructive actions read red, green
  // for completions, etc. Escape cancels; Enter confirms (when focus
  // isn't in a textarea); backdrop click cancels; focus is restored to
  // the element that opened the modal on close.
  function kdModal_(opts) {
    opts = opts || {};
    return new Promise(function (resolve) {
      var overlay = document.createElement('div');
      overlay.className = 'kd-modal';

      var inner = document.createElement('div');
      inner.className = 'kd-modal-inner';

      if (opts.title) {
        var h2 = document.createElement('h2');
        h2.className = 'kd-modal-title';
        h2.textContent = opts.title;
        inner.appendChild(h2);
      }

      if (opts.body) {
        var body = document.createElement('div');
        body.className = 'kd-modal-body';
        // Preserve embedded newlines (a few call sites pass multi-line
        // messages) without letting caller-supplied HTML interpolate —
        // every segment is a Text node.
        var lines = String(opts.body).split('\n');
        for (var i = 0; i < lines.length; i++) {
          if (i > 0) body.appendChild(document.createElement('br'));
          body.appendChild(document.createTextNode(lines[i]));
        }
        inner.appendChild(body);
      }

      var input = null;
      if (opts.variant === 'prompt') {
        var row = document.createElement('div');
        row.className = 'kd-modal-prompt-row';
        input = document.createElement('input');
        input.type = 'text';
        input.className = 'kd-modal-prompt-input';
        if (opts.placeholder) input.placeholder = opts.placeholder;
        if (opts.initialValue) input.value = opts.initialValue;
        row.appendChild(input);
        inner.appendChild(row);
      }

      var actions = document.createElement('div');
      actions.className = 'form-actions';

      var cancelBtn = null;
      if (opts.variant !== 'alert') {
        cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.className = 'btn btn-secondary';
        cancelBtn.textContent = opts.cancelLabel || 'Cancel';
        actions.appendChild(cancelBtn);
      }

      var confirmBtn = document.createElement('button');
      confirmBtn.type = 'button';
      var kind = opts.confirmKind || 'primary';
      var kindClass = kind === 'danger'  ? ' btn-danger'
                    : kind === 'success' ? ' btn-success'
                    : '';
      confirmBtn.className = 'btn' + kindClass;
      confirmBtn.textContent = opts.confirmLabel || 'OK';
      actions.appendChild(confirmBtn);

      inner.appendChild(actions);
      overlay.appendChild(inner);
      document.body.appendChild(overlay);

      var trigger = document.activeElement;
      function cleanup(result) {
        document.removeEventListener('keydown', onKey, true);
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        if (trigger && typeof trigger.focus === 'function') {
          try { trigger.focus(); } catch (_) {}
        }
        resolve(result);
      }

      function onKey(ev) {
        if (ev.key === 'Escape') {
          ev.preventDefault();
          cleanup(opts.variant === 'prompt' ? null
               : opts.variant === 'alert'  ? undefined
               : false);
        } else if (ev.key === 'Enter' && ev.target && ev.target.tagName !== 'TEXTAREA') {
          ev.preventDefault();
          confirmBtn.click();
        }
      }

      confirmBtn.addEventListener('click', function () {
        if (opts.variant === 'prompt') cleanup(input.value);
        else if (opts.variant === 'alert') cleanup();
        else cleanup(true);
      });
      if (cancelBtn) cancelBtn.addEventListener('click', function () {
        cleanup(opts.variant === 'prompt' ? null : false);
      });
      overlay.addEventListener('click', function (ev) {
        if (ev.target === overlay) {
          cleanup(opts.variant === 'prompt' ? null
               : opts.variant === 'alert'  ? undefined
               : false);
        }
      });

      document.addEventListener('keydown', onKey, true);

      // Focus policy: prompt → the input. Destructive confirm → the
      // Cancel button (so an accidental Enter doesn't delete). Anything
      // else → the confirm button.
      setTimeout(function () {
        if (input) { input.focus(); input.select(); }
        else if (kind === 'danger' && cancelBtn) cancelBtn.focus();
        else confirmBtn.focus();
      }, 0);
    });
  }

  function kdConfirm(opts) {
    opts = opts || {};
    return kdModal_({
      variant:      'confirm',
      title:        opts.title,
      body:         opts.body,
      confirmLabel: opts.confirmLabel,
      cancelLabel:  opts.cancelLabel,
      confirmKind:  opts.confirmKind
    });
  }

  function kdAlert(opts) {
    opts = opts || {};
    return kdModal_({
      variant:      'alert',
      title:        opts.title,
      body:         opts.body,
      confirmLabel: opts.confirmLabel || 'OK',
      confirmKind:  opts.confirmKind
    });
  }

  function kdPrompt(opts) {
    opts = opts || {};
    return kdModal_({
      variant:      'prompt',
      title:        opts.title,
      body:         opts.body,
      placeholder:  opts.placeholder,
      initialValue: opts.initialValue,
      confirmLabel: opts.confirmLabel,
      cancelLabel:  opts.cancelLabel,
      confirmKind:  opts.confirmKind
    });
  }

  function toast(msg, kind) {
    var host = document.getElementById('toast-host');
    if (!host) {
      host = document.createElement('div');
      host.id = 'toast-host';
      host.className = 'toast-host';
      document.body.appendChild(host);
    }
    var el = document.createElement('div');
    el.className = 'toast toast-' + (kind || 'info');
    el.textContent = String(msg);
    host.appendChild(el);
    var ttlMs = (kind === 'error' || kind === 'warn') ? 6500 : 3500;
    setTimeout(function () {
      el.classList.add('toast-leaving');
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 250);
    }, ttlMs);
  }
</script>
