<!--
  Bishopric Roster (Chunks 5 + 7).

  Renders the active seats for the bishopric member's own ward — scope
  is derived server-side from Auth_findBishopricRole(principal), not
  from a URL parameter. A bishopric member for CO physically cannot
  request GE's roster through this page.

  Chunk 7: every manual/temp row gains an X/trashcan in a rightmost
  Remove column. Clicking opens a modal — "Remove access for [person]?"
  with a required reason field — that submits a `remove` Request via
  ApiRequests_submit (the same shared endpoint used for add_manual /
  add_temp). Auto rows render no X (importer-owned per spec; auto
  removals are LCR changes, not app actions).

  When the row already has a pending remove request (server flags it
  via row.removal_pending), the X is replaced by a "Removal pending"
  inline label so the requester can't double-submit. Server-side
  guards in RequestsService_submit reinforce the rule.
-->
<section class="roster-page">
  <div class="roster-header">
    <h1>Ward Roster</h1>
    <span class="roster-scope-label" id="roster-scope-label"></span>
  </div>
  <!-- Multi-ward bishopric: populated by init when allowed_wards has
       more than one entry. Hidden for the common single-ward case.
       Uses inline `display:none` so no CSS specificity surprise can
       leave it visible (the `.ward-select-row` rule sets `display:
       flex` which beats the `.hidden` utility on equal specificity
       / later-cascade grounds — inline style trumps both). -->
  <div id="ward-select-row" class="ward-select-row" style="display:none">
    <label for="ward-select">Ward:</label>
    <select id="ward-select"></select>
  </div>
  <div id="utilization-host"></div>
  <div id="roster-table-host"><div class="empty-state">Loading roster…</div></div>

  <!-- Remove-confirmation modal. Shared shape with stake/Roster.html;
       the two pages keep their own copy because Apps Script doesn't have
       a partial-include surface from inside ui/ that's worth pulling in
       for a single dialog. -->
  <div id="remove-modal" class="remove-modal hidden" role="dialog" aria-modal="true">
    <div class="remove-modal-inner">
      <h2 id="rm-title">Remove access</h2>
      <div id="rm-summary" class="remove-modal-summary"></div>
      <form id="rm-form">
        <div class="form-row">
          <label><strong>Reason for removal</strong> (required, sent to managers)<br>
            <textarea id="rm-reason" rows="3" required></textarea>
          </label>
        </div>
        <div class="form-actions">
          <button type="button" id="rm-cancel-btn"  class="btn btn-secondary">Cancel</button>
          <button type="submit" id="rm-submit-btn"  class="btn btn-danger">Submit removal request</button>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
(function () {
  // Chunk 10.6: pane-scoped $.
  var __pane = null;
  function $(id) { return (__pane || document).querySelector('#' + id); }

  var rowsBySeatId = {};
  var currentScope = '';
  var wardPickerWired = false;

  function refresh() {
    $('roster-table-host').innerHTML = '<div class="empty-state">Loading roster…</div>';
    // currentScope is the active ward selection (empty on first load —
    // server picks the first allowed ward). Post-Chunk-10.6 polish: a
    // multi-ward bishopric can pick via the Ward dropdown.
    rpc('ApiBishopric_roster', currentScope || null).then(function (resp) {
      currentScope = resp.summary.scope;
      $('roster-scope-label').textContent =
        resp.summary.ward_name + ' (' + resp.summary.scope + ')';
      $('utilization-host').innerHTML = renderUtilizationBar(resp.summary);
      setupWardPicker(resp.allowed_wards || [], resp.selected_scope || currentScope);

      rowsBySeatId = {};
      for (var i = 0; i < resp.rows.length; i++) {
        rowsBySeatId[resp.rows[i].seat_id] = resp.rows[i];
      }

      $('roster-table-host').innerHTML = renderRosterCards(resp.rows, {
        emptyMsg: 'No seats assigned to this ward yet. Run the importer (a Kindoo Manager has an Import page) or submit a request from "New Kindoo Request".',
        rowActions: function (row) {
          // Auto rows are not removable via this app — auto seats track LCR
          // callings; remove the calling in LCR and the next import deletes
          // the seat. Render an empty cell.
          if (row.type === 'auto') return '';
          if (row.removal_pending) {
            // Disabled-X with explanatory tooltip. Visually distinct from
            // an enabled X so the user understands why their click does
            // nothing.
            return '<span class="remove-disabled" title="A removal request is already pending for this row">⌫</span>';
          }
          return '<button class="btn btn-icon btn-remove" data-seat-remove="' +
            escapeHtml(row.seat_id) + '" title="Request removal of this seat">⌫</button>';
        }
      });

      Array.prototype.forEach.call(
        $('roster-table-host').querySelectorAll('button[data-seat-remove]'),
        function (btn) {
          btn.addEventListener('click', function () {
            openRemoveModal(btn.getAttribute('data-seat-remove'));
          });
        }
      );
    }).catch(function (err) {
      var msg = (err && err.message) ? err.message : String(err);
      $('roster-table-host').innerHTML =
        '<div class="error">Could not load roster: ' + escapeHtml(msg) + '</div>';
    });
  }

  // Render the ward-switcher on responses with more than one allowed
  // ward. Single-ward principals (the common case) never see the row.
  // Wiring is idempotent — first call populates + attaches the change
  // listener; subsequent refresh() calls just re-sync the selection.
  function setupWardPicker(allowedWards, selectedScope) {
    var row = $('ward-select-row');
    var sel = $('ward-select');
    if (!row || !sel) return;
    if (allowedWards.length <= 1) {
      row.style.display = 'none';
      return;
    }
    // Clear the inline `display:none` so the CSS rule (display:flex)
    // kicks back in.
    row.style.display = '';
    if (!wardPickerWired) {
      var html = '';
      for (var i = 0; i < allowedWards.length; i++) {
        html += '<option value="' + escapeHtml(allowedWards[i].scope) + '">' +
                  escapeHtml(allowedWards[i].label) + '</option>';
      }
      sel.innerHTML = html;
      sel.addEventListener('change', function () {
        currentScope = this.value;
        refresh();
      });
      wardPickerWired = true;
    }
    sel.value = selectedScope;
  }

  function openRemoveModal(seatId) {
    var row = rowsBySeatId[seatId];
    if (!row) {
      toast('Seat not found in the current view.', 'error');
      return;
    }
    var memberLine = (row.member_name ? escapeHtml(row.member_name) + ' — ' : '') +
      '<span class="roster-email">' + escapeHtml(row.member_email) + '</span>';
    $('rm-title').innerHTML = 'Remove access for ' + (row.member_name ? escapeHtml(row.member_name) : escapeHtml(row.member_email)) + '?';
    var dates = '';
    if (row.type === 'temp') {
      dates = '<div class="queue-field"><span class="label">Dates:</span> ' +
        escapeHtml(row.start_date || '?') + ' → ' + escapeHtml(row.end_date || '?') + '</div>';
    }
    $('rm-summary').innerHTML =
      '<div class="queue-field"><span class="label">Member:</span> ' + memberLine + '</div>' +
      '<div class="queue-field"><span class="label">Type:</span> ' + escapeHtml(row.type) + '</div>' +
      '<div class="queue-field"><span class="label">Reason on file:</span> ' +
        escapeHtml(row.reason || '(none)') + '</div>' +
      dates +
      (row.building_names
        ? '<div class="queue-field"><span class="label">Buildings:</span> ' +
            escapeHtml(row.building_names) + '</div>'
        : '');
    $('rm-reason').value = '';
    $('remove-modal').setAttribute('data-seat-id', seatId);
    $('remove-modal').classList.remove('hidden');
    $('rm-submit-btn').disabled = false;
    setTimeout(function () { $('rm-reason').focus(); }, 50);
  }

  function closeRemoveModal() {
    $('remove-modal').classList.add('hidden');
    $('remove-modal').removeAttribute('data-seat-id');
  }

  // Exported entry point (Chunk 10.6). Modal listeners live on the
  // modal element itself — which is inside #content and gets torn out
  // on every nav swap — so no teardown is needed; the next init
  // re-wires them.
  window.page_bishopric_roster_init = function (pageModel, queryParams, pane) {
    __pane = pane;
    $('rm-cancel-btn').addEventListener('click', closeRemoveModal);
    $('remove-modal').addEventListener('click', function (ev) {
      if (ev.target === this) closeRemoveModal();
    });
    $('rm-form').addEventListener('submit', function (ev) {
      ev.preventDefault();
      var seatId = $('remove-modal').getAttribute('data-seat-id');
      if (!seatId) return;
      var row = rowsBySeatId[seatId];
      if (!row) {
        toast('Seat not found.', 'error');
        closeRemoveModal();
        return;
      }
      var reason = $('rm-reason').value.trim();
      if (!reason) {
        toast('A reason is required.', 'error');
        return;
      }
      var draft = {
        type:         'remove',
        member_email: row.member_email,
        member_name:  row.member_name || '',
        reason:       reason
      };
      $('rm-submit-btn').disabled = true;
      rpc('ApiRequests_submit', draft, currentScope).then(function (resp) {
        toast('Removal request submitted.', 'success');
        if (resp && resp.warning) toast(resp.warning, 'warn');
        closeRemoveModal();
        refresh();
      }).catch(function (err) {
        toast(err.message || String(err), 'error');
        $('rm-submit-btn').disabled = false;
      });
    });

    refresh();
  };
})();
</script>
