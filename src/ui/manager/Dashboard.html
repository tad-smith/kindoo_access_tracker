<!--
  Manager Dashboard (Chunk 10; spec §5.3).

  The manager default landing page (Router_defaultPageFor_ returns
  'mgr/dashboard' for the manager role). Five cards, all rendered from a
  single ApiManager_dashboard rpc so the landing is one round-trip:

    1. Pending Requests   — counts per type; deep-link to ?p=mgr/queue
    2. Recent Activity    — last 10 audit rows; deep-link to ?p=mgr/audit
    3. Utilization        — per-ward + stake bars; deep-link to
                            ?p=mgr/seats&ward=<code> (or =stake)
    4. Warnings           — over-cap pools from Config.last_over_caps_json
                            (same shape the Import page banner uses).
    5. Last Operations    — last_import_at / last_expiry_at /
                            last_triggers_installed_at (Q-8.1 resolution).

  Deep links navigate the top frame (not the iframe) via MAIN_URL.
  Nothing renders client-side state beyond what the rpc returned — a
  second action (e.g. a new request submit) is reflected by reloading
  the page rather than incrementally patching the DOM, because the
  dashboard is cheap to render and consistency > cleverness here.
-->
<section class="dashboard-page">
  <h1>Dashboard</h1>
  <p class="dashboard-intro">
    Manager landing page. Click any card's content to jump to the
    relevant page (seats / queue / audit log). Reload to refresh.
  </p>

  <!-- Card order (Chunk 10.6 tweak, 2026-04-22):
         row 1: Pending + Utilization
         row 2: Warnings + Recent Activity
         row 3: Last Operations (spans row when only one card)
       Grouping reason: the two rows most likely to drive action
       (pending + over-cap warnings) cluster on the left side on
       desktop; glanceable state (utilization, recent activity) on
       the right; the rarely-read "when did the triggers last run"
       card lands at the bottom. -->
  <div class="dashboard-grid" id="dashboard-grid">
    <div class="dashboard-card" id="card-pending">
      <h2 class="dashboard-card-title">Pending Requests</h2>
      <div class="dashboard-card-empty">Loading…</div>
    </div>
    <div class="dashboard-card" id="card-utilization">
      <h2 class="dashboard-card-title">Utilization</h2>
      <div class="dashboard-card-empty">Loading…</div>
    </div>
    <div class="dashboard-card card-warnings" id="card-warnings">
      <h2 class="dashboard-card-title">Warnings</h2>
      <div class="dashboard-card-empty">Loading…</div>
    </div>
    <div class="dashboard-card" id="card-recent">
      <h2 class="dashboard-card-title">Recent Activity</h2>
      <div class="dashboard-card-empty">Loading…</div>
    </div>
    <div class="dashboard-card" id="card-ops">
      <h2 class="dashboard-card-title">Last Operations</h2>
      <div class="dashboard-card-empty">Loading…</div>
    </div>
  </div>
</section>

<script>
(function () {
  // Chunk 10.6 keep-alive cache: the shell hands init the pane root.
  // Scoping $ to the pane means rpc callbacks can write to our DOM
  // whether the pane is currently attached (user on this tab) or
  // cached-detached (user switched away mid-load — the writes land
  // on the detached subtree and show up on nav-back).
  var __pane = null;
  function $(id) { return (__pane || document).querySelector('#' + id); }

  // Shared deep-link helper. The iframe can't navigate top via a relative
  // URL so we always build from MAIN_URL (Layout.html injects it globally).
  // The returned URL is used both as the anchor's href (top-frame
  // fallback for right-click / middle-click) and — via a sibling
  // data-page attribute — as the target for Layout.html's delegated
  // click handler, which intercepts normal clicks for a fast in-app
  // swap (Chunk 10.6).
  function pageHref(page, params) {
    var base = (typeof MAIN_URL === 'string') ? MAIN_URL : '';
    if (!base) return '#';
    var qs = ['p=' + encodeURIComponent(page)];
    if (params) {
      for (var k in params) {
        if (!params.hasOwnProperty(k)) continue;
        var v = params[k];
        if (v == null || v === '') continue;
        qs.push(encodeURIComponent(k) + '=' + encodeURIComponent(v));
      }
    }
    return base + '?' + qs.join('&');
  }

  function renderPending(p) {
    var host = $('card-pending');
    var head = '<h2 class="dashboard-card-title">Pending Requests</h2>';
    if (!p || p.total === 0) {
      host.innerHTML = head +
        '<div class="dashboard-card-empty">No pending requests. Queue is empty. Nice.</div>';
      return;
    }
    var byType = p.by_type || {};
    var typeOrder = ['add_manual', 'add_temp', 'remove'];
    var list = '';
    for (var i = 0; i < typeOrder.length; i++) {
      var t = typeOrder[i];
      var n = byType[t] || 0;
      if (n === 0) continue;
      var href = pageHref('mgr/queue', { state: 'pending', type: t });
      list += '<li>' +
        '<a class="dashboard-activity-link" data-page="mgr/queue" target="_top" href="' +
          escapeHtml(href) + '">' + escapeHtml(t) + '</a>' +
        '<span class="dashboard-pending-count">' + n + '</span>' +
        '</li>';
    }
    var all = pageHref('mgr/queue', { state: 'pending' });
    host.innerHTML = head +
      '<div class="dashboard-card-total">' + p.total + '</div>' +
      '<ul class="dashboard-pending-list">' + list + '</ul>' +
      '<div class="dashboard-card-sub">' +
        '<a class="dashboard-activity-link" data-page="mgr/queue" target="_top" href="' + escapeHtml(all) +
          '">View queue →</a>' +
      '</div>';
  }

  function renderRecent(rows) {
    var host = $('card-recent');
    var head = '<h2 class="dashboard-card-title">Recent Activity</h2>';
    if (!rows || rows.length === 0) {
      host.innerHTML = head +
        '<div class="dashboard-card-empty">No recent activity. Actions across the app will show here.</div>';
      return;
    }
    var list = '';
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var automated = (r.actor_email === 'Importer' || r.actor_email === 'ExpiryTrigger');
      var actorClass = automated ? 'dashboard-activity-actor actor-automated' : 'dashboard-activity-actor';
      // Deep-link to the audit log filtered by entity_id so the user
      // can see the full trail for this record.
      var href = pageHref('mgr/audit', { entity_id: r.entity_id });
      list += '<li>' +
        '<a class="dashboard-activity-link" data-page="mgr/audit" target="_top" href="' + escapeHtml(href) + '">' +
          '<span class="' + actorClass + '">' + escapeHtml(r.actor_email) + '</span>' +
          escapeHtml(r.summary) +
        '</a>' +
        '<span class="dashboard-activity-ts">' + escapeHtml(r.timestamp) + '</span>' +
        '</li>';
    }
    var all = pageHref('mgr/audit');
    host.innerHTML = head +
      '<ul class="dashboard-activity-list">' + list + '</ul>' +
      '<div class="dashboard-card-sub">' +
        '<a class="dashboard-activity-link" data-page="mgr/audit" target="_top" href="' + escapeHtml(all) +
          '">Full audit log →</a>' +
      '</div>';
  }

  function renderUtilization(utils) {
    var host = $('card-utilization');
    var head = '<h2 class="dashboard-card-title">Utilization</h2>';
    if (!utils || utils.length === 0) {
      host.innerHTML = head +
        '<div class="dashboard-card-empty">No wards configured yet.</div>';
      return;
    }
    var list = '';
    for (var i = 0; i < utils.length; i++) {
      var u = utils[i];
      var href = pageHref('mgr/seats', { ward: u.scope });
      var cap = (u.cap == null || u.cap <= 0) ? null : u.cap;
      var pct = cap ? Math.min(100, Math.round((u.count / cap) * 100)) : 0;
      var fillClass = 'dashboard-util-fill state-' + u.state;
      var counts = cap
        ? (u.count + ' / ' + cap + (u.state === 'over' ? ' · OVER' : ''))
        : (u.count + ' seats (cap unset)');
      list += '<li class="dashboard-util-row">' +
        '<div class="dashboard-util-head">' +
          '<a data-page="mgr/seats" target="_top" href="' + escapeHtml(href) + '">' +
            escapeHtml(u.label) + '</a>' +
          '<span class="dashboard-util-counts">' + escapeHtml(counts) + '</span>' +
        '</div>' +
        (cap
          ? '<div class="dashboard-util-bar"><div class="' + fillClass +
            '" style="width:' + pct + '%"></div></div>'
          : '') +
      '</li>';
    }
    host.innerHTML = head +
      '<ul class="dashboard-util-list">' + list + '</ul>';
  }

  function renderWarnings(warn) {
    var host = $('card-warnings');
    var head = '<h2 class="dashboard-card-title">Warnings</h2>';
    var pools = (warn && warn.over_caps) || [];
    if (pools.length === 0) {
      host.classList.add('has-none');
      host.innerHTML = head +
        '<div class="dashboard-card-empty">No warnings. All pools within cap.</div>';
      return;
    }
    host.classList.remove('has-none');
    var list = '';
    for (var i = 0; i < pools.length; i++) {
      var p = pools[i];
      var href = pageHref('mgr/seats', { ward: p.scope });
      var label = p.scope === 'stake'
        ? 'Stake'
        : ('Ward ' + p.scope + (p.ward_name ? ' (' + p.ward_name + ')' : ''));
      list += '<li>' +
        '<strong>' + escapeHtml(label) + '</strong>: ' +
        escapeHtml(p.count + ' / ' + p.cap) +
        ' <span class="dashboard-card-sub">(over by ' + escapeHtml(p.over_by) + ')</span> ' +
        '<a data-page="mgr/seats" target="_top" href="' + escapeHtml(href) + '">view →</a>' +
        '</li>';
    }
    host.innerHTML = head +
      '<ul class="dashboard-warning-list">' + list + '</ul>' +
      '<div class="dashboard-card-sub">' +
        'From the last import run. Reduce manual/temp seats, raise the cap, ' +
        'or re-run the import on the Import page to clear once resolved.' +
      '</div>';
  }

  function renderOps(ops) {
    var host = $('card-ops');
    var head = '<h2 class="dashboard-card-title">Last Operations</h2>';
    if (!ops) {
      host.innerHTML = head +
        '<div class="dashboard-card-empty">Loading…</div>';
      return;
    }
    function row(label, ts, summary) {
      var valCell;
      if (!ts) {
        valCell = '<span class="dashboard-ops-value-never">never</span>';
      } else {
        valCell = escapeHtml(ts) +
          (summary ? '<br><span class="dashboard-card-sub">' + escapeHtml(summary) + '</span>' : '');
      }
      return '<tr>' +
        '<td class="dashboard-ops-label">' + escapeHtml(label) + '</td>' +
        '<td class="dashboard-ops-value">' + valCell + '</td>' +
      '</tr>';
    }
    host.innerHTML = head +
      '<table class="dashboard-ops-table"><tbody>' +
        row('Last import', ops.last_import_at, ops.last_import_summary) +
        row('Last expiry', ops.last_expiry_at, ops.last_expiry_summary) +
        row('Triggers installed', ops.last_triggers_installed_at, null) +
      '</tbody></table>';
  }

  function render(resp) {
    renderPending(resp.pending);
    renderRecent(resp.recent_activity);
    renderUtilization(resp.utilization);
    renderWarnings(resp.warnings);
    renderOps(resp.last_operations);
  }

  function showError(msg) {
    var cards = ['card-pending', 'card-recent', 'card-utilization', 'card-warnings', 'card-ops'];
    for (var i = 0; i < cards.length; i++) {
      var host = $(cards[i]);
      if (!host) continue;
      var title = host.querySelector('.dashboard-card-title');
      host.innerHTML = (title ? title.outerHTML : '') +
        '<div class="error">' + escapeHtml(msg) + '</div>';
    }
  }

  // Exported entry point (Chunk 10.6). Every nav entry to the
  // Dashboard — initial bootstrap or an intra-app swap — flows through
  // here. Single aggregating rpc is unchanged from Chunk 10.
  window.page_mgr_dashboard_init = function (pageModel, queryParams, pane) {
    __pane = pane;
    rpc('ApiManager_dashboard').then(render).catch(function (err) {
      var msg = (err && err.message) ? err.message : String(err);
      showError(msg);
      toast(msg, 'error');
    });
  };
})();
</script>
