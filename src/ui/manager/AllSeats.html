<!--
  Kindoo Manager All Seats (Chunks 5 + 6).

  Full roster across every scope, with ward / building / type filters
  (AND-combined). Per-scope summaries with utilization bars render
  above the table so the manager can see over-cap conditions at a
  glance, even while filtering to a subset.

  Initial filter values come from the URL's query params (deep link
  support — `?p=mgr/seats&ward=CO&type=manual`): Main.doGet forwards
  the params into `QUERY_PARAMS` (Layout.html). Changing filters
  re-fetches but DOES NOT update the top-frame URL — that's a
  cross-origin restriction from the HtmlService iframe (see
  open-questions.md A-8).

  Chunk 6 adds inline edit for manual/temp rows (member_name, reason,
  building_names; plus start_date/end_date on temp). Auto rows are not
  editable — they're importer-owned and would be overwritten on the
  next Import Now run. The edit button only appears on manual/temp
  rows; SeatsRepo reinforces the rule server-side.

  Target scale (~240 rows at 12 wards × ~20 seats) renders in one pass
  with sticky headers — no pagination (see architecture.md §1 and
  build-plan Chunk 5 "Out of scope: Server-side pagination").
-->
<section class="all-seats-page">
  <h1>All Seats</h1>
  <p class="roster-scope-label">Full roster across every scope.</p>

  <div class="all-seats-filters">
    <label>Scope:
      <select id="ward-filter">
        <option value="">All</option>
      </select>
    </label>
    <label>Building:
      <select id="building-filter">
        <option value="">All</option>
      </select>
    </label>
    <label>Type:
      <select id="type-filter">
        <option value="">All</option>
        <option value="auto">auto</option>
        <option value="manual">manual</option>
        <option value="temp">temp</option>
      </select>
    </label>
    <span class="all-seats-count" id="all-seats-count"></span>
  </div>

  <div id="overall-utilization-host" class="overall-utilization-host"></div>

  <div id="summaries-host" class="all-seats-summaries"></div>

  <div id="roster-table-host"><div class="empty-state">Loading seats…</div></div>

  <!-- Edit modal (Chunk 6). Hidden by default; shown when the manager
       clicks Edit on a manual/temp row. Non-modal on small viewports
       for usability. -->
  <div id="seat-edit-modal" class="seat-edit-modal hidden" role="dialog" aria-modal="true">
    <div class="seat-edit-modal-inner">
      <h2>Edit seat</h2>
      <form id="seat-edit-form">
        <div class="form-row">
          <label>Scope<br><input type="text" id="se-scope" readonly></label>
        </div>
        <div class="form-row">
          <label>Type<br><input type="text" id="se-type" readonly></label>
        </div>
        <div class="form-row">
          <label>Email (immutable)<br><input type="text" id="se-email" readonly></label>
        </div>
        <div class="form-row">
          <label>Member name<br><input type="text" id="se-member-name"></label>
        </div>
        <div class="form-row">
          <label>Reason<br><textarea id="se-reason" rows="2"></textarea></label>
        </div>
        <div class="form-row">
          <label>Building names (comma-separated)<br><input type="text" id="se-buildings"></label>
        </div>
        <div class="form-row temp-only hidden" id="se-temp-fields">
          <label>Start date<br><input type="date" id="se-start-date"></label>
          <label>End date<br><input type="date" id="se-end-date"></label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="se-cancel-btn">Cancel</button>
          <button type="submit" class="btn" id="se-save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
(function () {
  // Chunk 10.6: $ scoped to this page's pane so rpc callbacks can
  // write to our DOM even when the pane is cached-detached.
  var __pane = null;
  function $(id) { return (__pane || document).querySelector('#' + id); }

  // Declared at module scope; page_mgr_seats_init seeds it from the
  // init-arg queryParams (preferred) or QUERY_PARAMS (initial-load
  // compatibility) on every entry so re-visiting via intra-app nav
  // lands on the correct filters.
  var filters = { ward: '', building: '', type: '' };
  var populatedOptions = false;

  function populateFilterOptions(opts) {
    if (populatedOptions) return;
    populatedOptions = true;
    // Ward filter: always-present 'stake' pseudo-option, then every
    // configured ward_code. 'All' is index 0 already.
    var wardSel = $('ward-filter');
    var stakeOpt = document.createElement('option');
    stakeOpt.value = 'stake';
    stakeOpt.textContent = 'Stake';
    wardSel.appendChild(stakeOpt);
    for (var i = 0; i < opts.wards.length; i++) {
      var w = document.createElement('option');
      w.value = opts.wards[i].ward_code;
      w.textContent = opts.wards[i].ward_name + ' (' + opts.wards[i].ward_code + ')';
      wardSel.appendChild(w);
    }
    // Building filter.
    var buildSel = $('building-filter');
    for (var j = 0; j < opts.buildings.length; j++) {
      var b = document.createElement('option');
      b.value = opts.buildings[j];
      b.textContent = opts.buildings[j];
      buildSel.appendChild(b);
    }
    // Re-apply deep-link filter values now that the dropdowns are
    // populated. If the URL referenced a ward that's since been
    // deleted, the select falls back to '' (All) silently — that's
    // preferable to showing a broken filter state.
    wardSel.value  = filters.ward     || '';
    buildSel.value = filters.building || '';
    $('type-filter').value = filters.type || '';
    filters.ward     = wardSel.value;
    filters.building = buildSel.value;
    filters.type     = $('type-filter').value;
  }

  function renderSummaries(summaries) {
    if (!summaries || summaries.length === 0) {
      $('summaries-host').innerHTML = '';
      return;
    }
    var html = '';
    for (var i = 0; i < summaries.length; i++) {
      var s = summaries[i];
      html += '<div class="all-seats-summary-card">' +
        '<div class="scope-label">' + escapeHtml(s.ward_name) + '</div>' +
        renderUtilizationBar(s) +
        '</div>';
    }
    $('summaries-host').innerHTML = html;
  }

  // Stake-wide utilization bar — one full-width row comparing every seat
  // in the stake against the Kindoo license cap (`stake_seat_cap`).
  // Rendered only when the Scope filter is "All" and the cap is
  // configured; otherwise the host stays empty. Visual style mirrors the
  // Dashboard's per-scope bars (dashboard-util-*) for consistency.
  function renderOverall(overall) {
    var host = $('overall-utilization-host');
    if (!host) return;
    var hasWardFilter = !!filters.ward;
    var cap = overall ? Number(overall.seat_cap) : 0;
    if (hasWardFilter || !overall || !cap || cap <= 0) {
      host.innerHTML = '';
      return;
    }
    var pct = overall.utilization_pct || 0;
    var fillClass = 'dashboard-util-fill state-' + (overall.state || 'ok');
    var counts = overall.total_seats + ' / ' + cap +
      (overall.over_cap ? ' · OVER' : '');
    host.innerHTML =
      '<div class="overall-utilization">' +
        '<div class="overall-utilization-head">' +
          '<span class="overall-utilization-label">Seat utilization</span>' +
          '<span class="dashboard-util-counts">' + escapeHtml(counts) + '</span>' +
        '</div>' +
        '<div class="dashboard-util-bar">' +
          '<div class="' + fillClass + '" style="width:' + pct + '%"></div>' +
        '</div>' +
      '</div>';
  }

  // Index the rows by seat_id so the edit modal can look up the
  // current values without re-fetching.
  var currentRowsById = {};

  function render(resp) {
    populateFilterOptions(resp.filter_options);
    renderOverall(resp.overall);
    renderSummaries(resp.summaries);
    $('all-seats-count').textContent =
      resp.total_rows + ' row' + (resp.total_rows === 1 ? '' : 's');

    currentRowsById = {};
    for (var i = 0; i < resp.rows.length; i++) currentRowsById[resp.rows[i].seat_id] = resp.rows[i];

    $('roster-table-host').innerHTML = renderRosterCards(resp.rows, {
      showScope: true,
      emptyMsg: 'No seats match the current filters.',
      rowActions: function (row) {
        // Auto rows are importer-owned; never editable here.
        if (row.type === 'auto' || !row.seat_id) return '';
        return '<button class="btn btn-secondary" data-seat-edit="' +
          escapeHtml(row.seat_id) + '">Edit</button>';
      }
    });

    // Wire edit buttons after the table is in the DOM.
    var host = $('roster-table-host');
    Array.prototype.forEach.call(host.querySelectorAll('button[data-seat-edit]'), function (btn) {
      btn.addEventListener('click', function () {
        openEditModal(btn.getAttribute('data-seat-edit'));
      });
    });
  }

  function openEditModal(seatId) {
    var row = currentRowsById[seatId];
    if (!row) {
      toast('Seat not found in the current view.', 'error');
      return;
    }
    $('se-scope').value       = row.scope || '';
    $('se-type').value        = row.type  || '';
    $('se-email').value       = row.member_email || '';
    $('se-member-name').value = row.member_name  || '';
    $('se-reason').value      = row.reason       || '';
    $('se-buildings').value   = row.building_names || '';
    var isTemp = row.type === 'temp';
    $('se-temp-fields').classList.toggle('hidden', !isTemp);
    if (isTemp) {
      $('se-start-date').value = row.start_date || '';
      $('se-end-date').value   = row.end_date   || '';
    } else {
      $('se-start-date').value = '';
      $('se-end-date').value   = '';
    }
    $('seat-edit-modal').classList.remove('hidden');
    $('seat-edit-modal').setAttribute('data-editing-seat', seatId);
  }

  function closeEditModal() {
    $('seat-edit-modal').classList.add('hidden');
    $('seat-edit-modal').removeAttribute('data-editing-seat');
  }

  function load() {
    $('roster-table-host').innerHTML = '<div class="empty-state">Loading seats…</div>';
    rpc('ApiManager_allSeats', filters).then(render).catch(function (err) {
      var msg = (err && err.message) ? err.message : String(err);
      $('roster-table-host').innerHTML =
        '<div class="error">Could not load seats: ' + escapeHtml(msg) + '</div>';
    });
  }

  // Exported entry point (Chunk 10.6). All listeners — including the
  // edit modal's — are on elements inside #content, so they die with
  // the DOM on the next swap; no teardown needed.
  window.page_mgr_seats_init = function (pageModel, queryParams, pane) {
    __pane = pane;
    var src = (queryParams && typeof queryParams === 'object') ? queryParams : (typeof QUERY_PARAMS === 'object' && QUERY_PARAMS ? QUERY_PARAMS : {});
    filters = {
      ward:     String(src.ward || ''),
      building: String(src.building || ''),
      type:     String(src.type || '')
    };
    populatedOptions = false;
    currentRowsById = {};

    $('se-cancel-btn').addEventListener('click', closeEditModal);
    $('seat-edit-modal').addEventListener('click', function (ev) {
      // Click outside the inner card closes the modal.
      if (ev.target === this) closeEditModal();
    });

    $('seat-edit-form').addEventListener('submit', function (ev) {
      ev.preventDefault();
      var seatId = $('seat-edit-modal').getAttribute('data-editing-seat');
      if (!seatId) return;
      var row = currentRowsById[seatId];
      var patch = {
        member_name:    $('se-member-name').value,
        reason:         $('se-reason').value,
        building_names: $('se-buildings').value
      };
      if (row && row.type === 'temp') {
        patch.start_date = $('se-start-date').value || '';
        patch.end_date   = $('se-end-date').value   || '';
      }
      $('se-save-btn').disabled = true;
      rpc('ApiManager_updateSeat', seatId, patch).then(function () {
        toast('Seat updated.', 'success');
        closeEditModal();
        load();
      }).catch(function (err) {
        toast(err.message || String(err), 'error');
      }).then(function () {
        $('se-save-btn').disabled = false;
      });
    });

    $('ward-filter').addEventListener('change', function () {
      filters.ward = this.value;
      load();
    });
    $('building-filter').addEventListener('change', function () {
      filters.building = this.value;
      load();
    });
    $('type-filter').addEventListener('change', function () {
      filters.type = this.value;
      load();
    });

    load();
  };
})();
</script>
