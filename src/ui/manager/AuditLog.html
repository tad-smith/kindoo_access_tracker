<!--
  Manager Audit Log (Chunk 10).

  Server-side-paginated, filterable view over the AuditLog tab. The
  Audit Log is the ONE page that paginates — every other read stays on
  the no-pagination stance in architecture.md §1. The tab grows ~300-500
  rows/week at target scale, so a year's data is ~20k rows; we can't
  render that as a single table.

  Filters combine as AND:
    - actor_email: literal match against "Importer" / "ExpiryTrigger"
      or canonical-email compare for real users.
    - action: exact match from the data-model.md §10 vocabulary.
    - entity_type: exact match; dropdown over the enum.
    - entity_id: exact case-sensitive match.
    - date_from / date_to: ISO dates, inclusive on both ends (script tz).
  Default window is the last 7 days when neither date is supplied, so
  the first page load isn't a full-history scan.

  Deep links: every filter key is read from QUERY_PARAMS, so
  ?p=mgr/audit&action=over_cap_warning lands with the filter pre-applied.

  Per-row diff rendering:
    - insert: before_json empty — show only the after row.
    - delete: after_json empty — show only the before row.
    - update: show a field-by-field diff (old → new) for fields that
      changed; unchanged fields are collapsed as "N unchanged".
  Q-7.1 resolution: complete_request rows with a non-empty
  completion_note surface the note in the collapsed view so the R-1
  "seat already removed at completion time" cases are visible without
  expanding.
-->
<section class="audit-log-page">
  <h1>Audit Log</h1>
  <p class="audit-log-intro">
    Every state-changing action in the app, with who did it and what
    changed. Filters combine as AND; the default view shows the last
    7 days.
  </p>

  <div class="audit-log-filters" id="audit-filters">
    <label>From (YYYY-MM-DD)
      <input type="date" id="f-date-from">
    </label>
    <label>To (YYYY-MM-DD)
      <input type="date" id="f-date-to">
    </label>
    <label>Actor (email, "Importer", "ExpiryTrigger")
      <input type="text" id="f-actor" placeholder="Any">
    </label>
    <label>Action
      <select id="f-action">
        <option value="">Any</option>
        <option value="insert">insert</option>
        <option value="update">update</option>
        <option value="delete">delete</option>
        <option value="submit_request">submit_request</option>
        <option value="complete_request">complete_request</option>
        <option value="reject_request">reject_request</option>
        <option value="cancel_request">cancel_request</option>
        <option value="auto_expire">auto_expire</option>
        <option value="import_start">import_start</option>
        <option value="import_end">import_end</option>
        <option value="over_cap_warning">over_cap_warning</option>
        <option value="reinstall_triggers">reinstall_triggers</option>
        <option value="setup_complete">setup_complete</option>
      </select>
    </label>
    <label>Entity type
      <select id="f-entity-type">
        <option value="">Any</option>
        <option value="Seat">Seat</option>
        <option value="Request">Request</option>
        <option value="Access">Access</option>
        <option value="Config">Config</option>
        <option value="Ward">Ward</option>
        <option value="Building">Building</option>
        <option value="KindooManager">KindooManager</option>
        <option value="Template">Template</option>
        <option value="System">System</option>
        <option value="Triggers">Triggers</option>
      </select>
    </label>
    <label>Entity id
      <input type="text" id="f-entity-id" placeholder="Exact match">
    </label>
    <div class="audit-log-filter-actions">
      <button type="button" class="btn" id="apply-filters-btn">Apply</button>
      <button type="button" class="btn btn-secondary" id="reset-filters-btn">Reset</button>
    </div>
  </div>

  <div class="audit-log-count">
    <span id="al-count-label">Loading…</span>
    <span class="audit-log-pagination">
      <button type="button" class="btn btn-secondary" id="prev-page-btn" disabled>← Prev</button>
      <button type="button" class="btn btn-secondary" id="next-page-btn" disabled>Next →</button>
    </span>
  </div>

  <div id="audit-table-host">Loading…</div>
</section>

<script>
(function () {
  // Chunk 10.6: pane-scoped $.
  var __pane = null;
  function $(id) { return (__pane || document).querySelector('#' + id); }

  // Action → colour category. Matches the data-model.md §10 action
  // vocabulary. Unknown actions fall back to the neutral grey.
  var ACTION_CATEGORY = {
    insert:             'crud',
    update:             'crud',
    delete:             'crud',
    submit_request:     'request',
    complete_request:   'request',
    reject_request:     'request',
    cancel_request:     'request',
    auto_expire:        'system',
    import_start:       'import',
    import_end:         'import',
    over_cap_warning:   'system',
    reinstall_triggers: 'system',
    setup_complete:     'system'
  };

  // The server clamps at 100 too — this is just the client-side cap so
  // our Next/Prev math lines up.
  var PAGE_LIMIT = 100;

  function qp(name) {
    return (typeof QUERY_PARAMS === 'object' && QUERY_PARAMS && QUERY_PARAMS[name])
      ? String(QUERY_PARAMS[name]) : '';
  }

  // Filter state is seeded from deep-link params on first load.
  var state = {
    actor_email: qp('actor') || qp('actor_email') || '',
    action:      qp('action'),
    entity_type: qp('entity_type') || qp('entity'),
    entity_id:   qp('entity_id') || qp('id'),
    date_from:   qp('date_from') || qp('from'),
    date_to:     qp('date_to') || qp('to'),
    offset:      0
  };

  function applyStateToInputs() {
    $('f-date-from').value   = state.date_from || '';
    $('f-date-to').value     = state.date_to   || '';
    $('f-actor').value       = state.actor_email || '';
    $('f-action').value      = state.action || '';
    $('f-entity-type').value = state.entity_type || '';
    $('f-entity-id').value   = state.entity_id || '';
  }

  function readInputs() {
    state.date_from   = $('f-date-from').value.trim();
    state.date_to     = $('f-date-to').value.trim();
    state.actor_email = $('f-actor').value.trim();
    state.action      = $('f-action').value;
    state.entity_type = $('f-entity-type').value;
    state.entity_id   = $('f-entity-id').value.trim();
  }

  function actionCategoryClass(action) {
    var cat = ACTION_CATEGORY[action] || '';
    return cat ? 'audit-action-' + cat : '';
  }

  function actorHtml(actor) {
    var esc = escapeHtml(actor);
    if (actor === 'Importer' || actor === 'ExpiryTrigger') {
      return '<span class="audit-log-actor-automated">' + esc + '</span>';
    }
    return esc;
  }

  function parseJsonSafe(s) {
    if (!s) return null;
    try { return JSON.parse(s); }
    // distinct from null so the caller knows it was malformed
    catch (e) { return undefined; }
  }

  // Pretty-print for the collapsed summary.
  function shortSummary(row) {
    var before = parseJsonSafe(row.before_json);
    var after  = parseJsonSafe(row.after_json);
    // Special cases first — rows that benefit from customisation over a
    // bare JSON key list.
    if (row.action === 'complete_request' && after && after.completion_note) {
      return 'Completed with note: "' + after.completion_note + '"';
    }
    if (row.action === 'over_cap_warning' && after && after.pools) {
      var pools = after.pools;
      var labels = pools.map(function (p) {
        return p.scope + ' (' + p.count + '/' + p.cap + ')';
      });
      return pools.length + ' pool' + (pools.length === 1 ? '' : 's') +
        ' over: ' + labels.join(', ');
    }
    if (row.action === 'import_end' && after) {
      var bits = [];
      if (after.inserted       != null) bits.push(after.inserted       + ' ins');
      if (after.deleted        != null) bits.push(after.deleted        + ' del');
      if (after.updated_names)          bits.push(after.updated_names  + ' name upd');
      if (after.access_added   != null) bits.push(after.access_added   + ' access+');
      if (after.access_removed != null) bits.push(after.access_removed + ' access-');
      if (after.elapsed_ms     != null) bits.push(after.elapsed_ms     + 'ms');
      if (after.error)                  bits.push('ERROR: ' + after.error);
      if (bits.length > 0) return bits.join(', ');
    }
    if (row.action === 'auto_expire' && before) {
      return 'expired temp seat for ' +
        (before.member_name || before.member_email || '(unknown)') +
        (before.end_date ? ' (end ' + before.end_date + ')' : '');
    }
    if (row.action === 'reinstall_triggers' && after && after.result && after.result.message) {
      return after.result.message;
    }
    // Generic fallbacks.
    if (before == null && after)  return 'insert: ' + topKeysSummary_(after);
    if (before && after == null)  return 'delete: ' + topKeysSummary_(before);
    if (before && after) {
      var changed = diffKeys_(before, after);
      if (changed.length === 0) return '(no field changes)';
      return 'changed: ' + changed.join(', ');
    }
    return '';
  }

  function topKeysSummary_(obj) {
    if (!obj || typeof obj !== 'object') return String(obj);
    // Pick a couple of "member-identifying" keys if they exist; fall
    // back to the first 3 keys otherwise.
    var prefs = ['member_name', 'member_email', 'email',
                 'building_name', 'ward_code', 'calling_name', 'scope'];
    var seen = {};
    var bits = [];
    for (var p = 0; p < prefs.length && bits.length < 3; p++) {
      var k = prefs[p];
      if (obj[k] != null && obj[k] !== '') {
        bits.push(k + '=' + stringifyValue_(obj[k]));
        seen[k] = true;
      }
    }
    var keys = Object.keys(obj);
    for (var i = 0; i < keys.length && bits.length < 3; i++) {
      if (seen[keys[i]]) continue;
      bits.push(keys[i] + '=' + stringifyValue_(obj[keys[i]]));
    }
    return bits.join(', ');
  }

  function stringifyValue_(v) {
    if (v == null) return '""';
    if (typeof v === 'object') return JSON.stringify(v);
    var s = String(v);
    if (s.length > 80) s = s.substring(0, 77) + '…';
    return s;
  }

  // Compute changed top-level keys between two objects. Ignores keys
  // whose values are deeply equal (via JSON.stringify compare — good
  // enough for our always-flat audit payloads).
  function diffKeys_(before, after) {
    if (!before || !after || typeof before !== 'object' || typeof after !== 'object') return [];
    var keys = {};
    for (var k in before) if (before.hasOwnProperty(k)) keys[k] = true;
    for (var k2 in after) if (after.hasOwnProperty(k2)) keys[k2] = true;
    var changed = [];
    var allKeys = Object.keys(keys);
    for (var i = 0; i < allKeys.length; i++) {
      var key = allKeys[i];
      if (JSON.stringify(before[key]) !== JSON.stringify(after[key])) changed.push(key);
    }
    return changed;
  }

  function diffTableHtml(before, after) {
    // Update path — render the changed fields only. Unchanged fields
    // are summarised as "N unchanged fields" so the reader knows the
    // row isn't truncated.
    var changed = diffKeys_(before, after);
    if (changed.length === 0) {
      return '<div class="audit-diff-unchanged">No field changes detected.</div>';
    }
    var rows = '';
    for (var i = 0; i < changed.length; i++) {
      var k = changed[i];
      rows += '<tr>' +
        '<td><code>' + escapeHtml(k) + '</code></td>' +
        '<td class="audit-diff-old">' + escapeHtml(stringifyValue_(before[k])) + '</td>' +
        '<td class="audit-diff-new">' + escapeHtml(stringifyValue_(after[k])) + '</td>' +
        '</tr>';
    }
    var allKeys = {};
    for (var ka in before) allKeys[ka] = true;
    for (var kb in after)  allKeys[kb] = true;
    var unchangedCount = Object.keys(allKeys).length - changed.length;
    var trailer = unchangedCount > 0
      ? '<div class="audit-diff-unchanged">' + unchangedCount + ' unchanged field' +
        (unchangedCount === 1 ? '' : 's') + ' not shown.</div>'
      : '';
    return '<table class="audit-diff-table"><thead><tr>' +
      '<th>Field</th><th>Before</th><th>After</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' + trailer;
  }

  // Full-side renderer (insert shows only after; delete shows only
  // before). Uses a simple "key: value" listing for readability.
  function oneSidedHtml(obj, label) {
    if (!obj || typeof obj !== 'object') {
      return '<div class="audit-diff-raw">' + escapeHtml(String(obj)) + '</div>';
    }
    var keys = Object.keys(obj).sort();
    if (keys.length === 0) {
      return '<div class="audit-diff-unchanged">No fields.</div>';
    }
    var rows = '';
    var colClass = label === 'before' ? 'audit-diff-old' : 'audit-diff-new';
    var colHeader = label === 'before' ? 'Before (deleted)' : 'After (inserted)';
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      rows += '<tr>' +
        '<td><code>' + escapeHtml(k) + '</code></td>' +
        '<td class="' + colClass + '">' + escapeHtml(stringifyValue_(obj[k])) + '</td>' +
        '</tr>';
    }
    return '<table class="audit-diff-table"><thead><tr>' +
      '<th>Field</th><th>' + colHeader + '</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function diffHtml(row) {
    var before = parseJsonSafe(row.before_json);
    var after  = parseJsonSafe(row.after_json);
    // A malformed payload (couldn't parse as JSON) — fall back to the raw
    // text so the reader can still see what was stored.
    if (before === undefined) {
      return '<div class="audit-diff-raw">' + escapeHtml(row.before_json) + '</div>' +
        (row.after_json ? '<div class="audit-diff-raw">' + escapeHtml(row.after_json) + '</div>' : '');
    }
    if (after === undefined) {
      return (row.before_json ? '<div class="audit-diff-raw">' + escapeHtml(row.before_json) + '</div>' : '') +
        '<div class="audit-diff-raw">' + escapeHtml(row.after_json) + '</div>';
    }
    if (before == null && after == null) {
      return '<div class="audit-diff-unchanged">No payload.</div>';
    }
    if (before == null)  return oneSidedHtml(after,  'after');
    if (after == null)   return oneSidedHtml(before, 'before');
    return diffTableHtml(before, after);
  }

  // TASKS.md #2: card-per-row layout. Compact flex-row; `<details>`
  // expansion kept inside the card so clicking "details" reveals the
  // before/after diff inline. Collapsed, each card occupies one row-
  // height unit — no gap between cards, matches the roster-card stack
  // visually.
  function rowHtml(row) {
    var summary = shortSummary(row);
    var completionNote = '';
    var after = parseJsonSafe(row.after_json);
    // Q-7.1: surface completion_note inline (even collapsed) so the R-1
    // no-op path is visible at a glance. Only on complete_request rows.
    if (row.action === 'complete_request' && after && after.completion_note) {
      completionNote =
        '<span class="audit-card-note"><strong>Note:</strong> ' +
          escapeHtml(after.completion_note) + '</span>';
    }
    var badge = '<span class="audit-action-badge ' +
      actionCategoryClass(row.action) + '">' +
      escapeHtml(row.action) + '</span>';
    return '<div class="audit-card">' +
      '<div class="audit-card-row">' +
        '<span class="audit-card-ts">' + escapeHtml(row.timestamp) + '</span>' +
        '<span class="audit-card-actor">' + actorHtml(row.actor_email) + '</span>' +
        badge +
        '<span class="audit-card-entity">' +
          '<code>' + escapeHtml(row.entity_type) + '</code>' +
          (row.entity_id ? ' <span class="audit-card-entity-id">' + escapeHtml(row.entity_id) + '</span>' : '') +
        '</span>' +
        (summary ? '<span class="audit-card-summary">' + escapeHtml(summary) + '</span>' : '') +
        completionNote +
        '<details class="audit-card-diff"><summary>details</summary>' +
          diffHtml(row) +
        '</details>' +
      '</div>' +
    '</div>';
  }

  function render(resp) {
    var rows = resp.rows || [];
    var applied = resp.applied_filters || {};

    // Pagination math — "Showing 1-N of M" style.
    var first = rows.length === 0 ? 0 : (resp.offset + 1);
    var last  = resp.offset + rows.length;
    var fromTo = rows.length === 0
      ? 'No matching rows.'
      : ('Showing ' + first + '–' + last + ' of ' + resp.total);
    var windowHint = '';
    if (applied.date_from && applied.date_to) {
      windowHint = ' · ' + applied.date_from + ' → ' + applied.date_to;
      if (resp.used_default_range) windowHint += ' (default last 7 days)';
    }
    $('al-count-label').textContent = fromTo + windowHint;

    $('prev-page-btn').disabled = (resp.offset <= 0);
    $('next-page-btn').disabled = !resp.has_more;

    if (rows.length === 0) {
      $('audit-table-host').innerHTML =
        '<div class="empty-state">' +
          'No audit rows match these filters. Broaden the date range or clear a filter.' +
        '</div>';
      return;
    }
    var html = '<div class="audit-log-cards">';
    for (var i = 0; i < rows.length; i++) html += rowHtml(rows[i]);
    html += '</div>';
    $('audit-table-host').innerHTML = html;
  }

  function load() {
    $('audit-table-host').innerHTML = '<div class="empty-state">Loading audit rows…</div>';
    $('prev-page-btn').disabled = true;
    $('next-page-btn').disabled = true;
    var filters = {
      actor_email: state.actor_email,
      action:      state.action,
      entity_type: state.entity_type,
      entity_id:   state.entity_id,
      date_from:   state.date_from,
      date_to:     state.date_to,
      offset:      state.offset,
      limit:       PAGE_LIMIT
    };
    rpc('ApiManager_auditLog', filters).then(function (resp) {
      // Reflect the server's applied filters back into the inputs so the
      // user sees the default date window on first load (instead of blank
      // inputs, which suggested "no filter").
      var applied = resp.applied_filters || {};
      if (resp.used_default_range) {
        state.date_from = applied.date_from || state.date_from;
        state.date_to   = applied.date_to   || state.date_to;
        applyStateToInputs();
      }
      render(resp);
    }).catch(function (err) {
      var msg = (err && err.message) ? err.message : String(err);
      $('audit-table-host').innerHTML =
        '<div class="error">Could not load audit log: ' + escapeHtml(msg) + '</div>';
      toast(msg, 'error');
    });
  }

  // Exported entry point (Chunk 10.6). Pagination state is re-derived
  // from the URL's query params on each init — so re-entering Audit
  // Log via intra-app nav (e.g. from Dashboard) preserves the
  // previously-applied filters, matching direct-load behaviour.
  window.page_mgr_audit_init = function (pageModel, queryParams, pane) {
    __pane = pane;
    // queryParams is authoritative on intra-app nav; the QUERY_PARAMS
    // global (kept in sync by Layout.html) is used via qp() for
    // initial-load compatibility. Re-seed state from whichever is
    // fresher.
    if (queryParams) {
      state = {
        actor_email: String(queryParams.actor || queryParams.actor_email || ''),
        action:      String(queryParams.action || ''),
        entity_type: String(queryParams.entity_type || queryParams.entity || ''),
        entity_id:   String(queryParams.entity_id || queryParams.id || ''),
        date_from:   String(queryParams.date_from || queryParams.from || ''),
        date_to:     String(queryParams.date_to   || queryParams.to   || ''),
        offset:      0
      };
    }

    $('apply-filters-btn').addEventListener('click', function () {
      readInputs();
      state.offset = 0;
      load();
    });
    $('reset-filters-btn').addEventListener('click', function () {
      state = { actor_email: '', action: '', entity_type: '', entity_id: '',
                date_from: '', date_to: '', offset: 0 };
      applyStateToInputs();
      load();
    });
    $('prev-page-btn').addEventListener('click', function () {
      state.offset = Math.max(0, state.offset - PAGE_LIMIT);
      load();
    });
    $('next-page-btn').addEventListener('click', function () {
      state.offset = state.offset + PAGE_LIMIT;
      load();
    });

    // Enter key in any text/date input → apply.
    Array.prototype.forEach.call(
      $('audit-filters').querySelectorAll('input[type="text"], input[type="date"]'),
      function (el) {
        el.addEventListener('keydown', function (ev) {
          if (ev.key === 'Enter') {
            ev.preventDefault();
            readInputs();
            state.offset = 0;
            load();
          }
        });
      }
    );

    applyStateToInputs();
    load();
  };
})();
</script>
