<!--
  Page shell. Drives the auth handshake for the two-deployment Session+HMAC
  pattern (architecture.md D10, open-questions.md A-8).

  Boot flow:
    1. doGet may have just consumed a `?token=…` from the Identity-deployment
       redirect, verified its HMAC server-side, and injected it as
       INJECTED_TOKEN. (Or set INJECTED_ERR on failure.)
    2. If INJECTED_TOKEN: stash in sessionStorage, reload top to clean
       MAIN_URL (strips ?token from the address bar).
    3. Else if INJECTED_ERR: surface it — usually a stale or wrong-secret
       token; route the user back to Login.
    4. Else if sessionStorage.jwt is present and not expired (decoded exp):
       call rpc('ApiShared_bootstrap', requestedPage) and render the page.
    5. Else: show the Login page. The "Sign in with Google" anchor's href is
       set to IDENTITY_URL by showLogin(). Clicking it navigates the top frame
       (via <base target="_top">) to the Identity deployment, which runs as
       the user, reads Session.getActiveUser, signs an HMAC token, and
       redirects back here with `?token=…` (step 1). No JS click handler —
       it's just a plain anchor.

  No browser-side OAuth happens anywhere — this whole flow is internal to
  script.google.com. The two failed attempts (GSI button → implicit flow →
  server-side code flow) all hit `origin_mismatch` because Google's OAuth
  endpoint inspects the iframe origin (*.googleusercontent.com), which is
  permanently denylisted as a JS origin. See open-questions.md A-8.
-->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>Kindoo Access Tracker</title>
    <?!= include('ui/Styles') ?>
  </head>
  <body>
    <header class="topbar">
      <div class="brand" id="brand">
        <img class="brand-icon" src="https://kindoo.csnorth.org/images/favicon-32x32.png" width="32" height="32" alt="" aria-hidden="true">
        <span id="brand-text">Kindoo Access Tracker</span>
      </div>
      <div class="topbar-right">
        <div class="user-meta" id="user-meta"></div>
        <button id="signout-btn" class="signout-btn hidden" type="button">Sign out</button>
      </div>
    </header>

    <div id="nav-host" class="nav-host hidden"></div>

    <main id="app">
      <div id="content" class="hidden">Loading…</div>
      <div id="login-container" class="hidden">
        <?!= include('ui/Login') ?>
      </div>
    </main>

    <!-- Offscreen staging area for background-preloaded panes. Panes
         attached here run their inline <script> blocks (an HTML-spec
         requirement — scripts in a fully-detached node never execute),
         so their page_<X>_init rpcs fire and populate the DOM. When
         the user navigates to the preloaded tab, navigateTo's
         appendChild on #content re-parents the pane, which implicitly
         removes it from staging. Kept outside #app so it can't be
         seen / focused / scrolled-to even if aria tooling bypasses
         the visibility rule. -->
    <div id="preload-staging" aria-hidden="true"
         style="position:absolute; left:-10000px; top:0; width:1px; height:1px; overflow:hidden; pointer-events:none;"></div>

    <footer class="version-stamp" title="Deployed source version. Compare against KINDOO_VERSION_ in src/core/Version.gs to detect a stale deployment.">
      v: <?= app_version ?>
    </footer>

    <script>
      var IDENTITY_URL    = <?!= JSON.stringify(identity_url) ?>;
      var MAIN_URL        = <?!= JSON.stringify(main_url) ?>;
      var INJECTED_TOKEN  = <?!= JSON.stringify(injected_token) ?>;
      var INJECTED_ERR    = <?!= JSON.stringify(injected_error) ?>;
      // The iframe URL doesn't carry the parent's ?p= — Apps Script
      // wraps user-supplied HTML in a *.googleusercontent.com iframe with
      // its own search params, so client-side URLSearchParams reads
      // those (e.g. ?createOAuthDialog=true), not what the user typed.
      // Main.doGet reads e.parameter.p server-side and hands it down here.
      var REQUESTED_PAGE  = <?!= JSON.stringify(requested_page) ?>;
      // Chunk 5: per-page query params (minus 'p' and 'token'), forwarded
      // from Main.doGet so pages can read deep-link state that the
      // iframe can't see on window.location (cross-origin top frame).
      // Example: mgr/seats reads QUERY_PARAMS.ward / .type / .building to
      // pre-populate its filter dropdowns.
      var QUERY_PARAMS    = <?!= JSON.stringify(query_params || {}) ?>;
    </script>
    <?!= include('ui/ClientUtils') ?>
    <script>
      (function () {
        function $(id) { return document.getElementById(id); }
        function show(el) { el.classList.remove('hidden'); }
        function hide(el) { el.classList.add('hidden'); }

        function setUserMeta(p) {
          if (!p) {
            $('user-meta').textContent = '';
            hide($('signout-btn'));
            return;
          }
          var label = (p.name && p.name.length) ? p.name + ' (' + p.email + ')' : p.email;
          $('user-meta').textContent = label;
          show($('signout-btn'));
        }

        // Swap the topbar brand to Config.stake_name when the bootstrap
        // response carries one; revert to the app name on sign-out /
        // error paths so a stale stake name can't bleed across sessions.
        var BRAND_DEFAULT_ = 'Kindoo Access Tracker';
        function setBrand(name) {
          $('brand-text').textContent = (name && String(name).length) ? String(name) : BRAND_DEFAULT_;
        }

        function setNav(html) {
          var host = $('nav-host');
          if (html && html.length) {
            host.innerHTML = html;
            rehydrateScripts(host);
            show(host);
          } else {
            host.innerHTML = '';
            hide(host);
          }
        }

        // Wire the sign-out click once at boot. Clears the session token
        // and navigates the top frame back to Main; the next doGet will
        // render Layout without INJECTED_TOKEN and the boot flow will
        // drop to showLogin(). We intentionally *don't* hit the Identity
        // project to revoke — there's nothing to revoke (tokens are
        // stateless) and Session.getActiveUser can't be reset from here.
        (function () {
          var btn = document.getElementById('signout-btn');
          if (!btn) return;
          btn.addEventListener('click', function () {
            sessionStorage.removeItem('jwt');
            if (MAIN_URL) {
              try { window.top.location.replace(MAIN_URL); return; } catch (e) {}
            }
            window.location.reload();
          });
        })();

        // Chunk 11.2: first-time-instructions overlay state. The flag
        // is per-browser (localStorage at the iframe's
        // googleusercontent.com origin — isolated from the wrapper
        // origin, which is what we want), and V1-versioned so a future
        // redesign can re-show instructions to all users without a
        // migration. localStorage access is wrapped in try/catch so a
        // privacy-mode-disabled browser degrades to "instructions every
        // login" rather than throwing.
        var INSTRUCTIONS_FLAG_KEY_ = 'kindooLoginInstructionsV1Seen';

        function getLoginInstructionsFlag_() {
          try { return localStorage.getItem(INSTRUCTIONS_FLAG_KEY_); }
          catch (e) { return null; }
        }

        function setLoginInstructionsFlag_() {
          try { localStorage.setItem(INSTRUCTIONS_FLAG_KEY_, '1'); }
          catch (e) { /* silent — overlay shows next time */ }
        }

        function showInstructionsOverlay_() {
          var overlay = $('instructions-overlay');
          if (overlay) {
            overlay.classList.remove('hidden');
            overlay.setAttribute('aria-hidden', 'false');
          }
        }

        function hideInstructionsOverlay_() {
          var overlay = $('instructions-overlay');
          if (overlay) {
            overlay.classList.add('hidden');
            overlay.setAttribute('aria-hidden', 'true');
          }
        }

        // Trigger the top-frame nav via the existing #signin-link anchor.
        // The anchor's href was set in showLogin() via buildIdentityUrl_(),
        // and Layout.html's <base target="_top"> ensures the click
        // navigates the top frame. Programmatic .click() preserves the
        // user-activation gesture from the button click that called us,
        // so the cross-origin top-frame nav isn't blocked.
        function startSignIn_() {
          var link = $('signin-link');
          if (link && link.href) link.click();
        }

        // Wire the overlay's two action handlers once at boot. Both
        // routes set the flag — even on auth failure, the user has SEEN
        // the instructions and showing them again would imply the failure
        // was their fault.
        (function wireInstructionsActions_() {
          var ack = $('instructions-acknowledge');
          if (ack) {
            ack.addEventListener('click', function () {
              setLoginInstructionsFlag_();
              hideInstructionsOverlay_();
              startSignIn_();
            });
          }
          var skip = $('instructions-skip');
          if (skip) {
            skip.addEventListener('click', function (e) {
              e.preventDefault();
              setLoginInstructionsFlag_();
              hideInstructionsOverlay_();
            });
          }
        })();

        // Build the Identity URL with a `redirect` param that carries the
        // current deep-link query (REQUESTED_PAGE + QUERY_PARAMS, server-
        // injected from Main.doGet). Identity round-trips the redirect
        // through to its Continue page; the wrapper extracts and applies
        // it after auth so a deep-linked URL pasted pre-sign-in preserves
        // its destination through the round-trip. Chunk 11.1.
        //
        // The redirect string is the inner URLSearchParams `.toString()`
        // (already URL-encoded by URLSearchParams), then `encodeURIComponent`'d
        // again because it travels as the value of a `redirect=` param on
        // the Identity URL — that's the standard double-encoding for
        // round-tripping a query string through a query-string boundary.
        // Empty REQUESTED_PAGE + empty QUERY_PARAMS → no `&redirect=`
        // appended; Identity treats a missing redirect as the no-deep-link
        // case.
        function buildIdentityUrl_() {
          if (!IDENTITY_URL) return '';
          var inner = new URLSearchParams();
          // Prefer window.location.search when it carries our `p` key —
          // Chunk 10.6's pushState writes the user's current in-app page
          // (and any filter state) into the iframe's URL, so re-auth
          // mid-session preserves the page the user was actually on,
          // not the one they cold-loaded with. On initial render the
          // iframe's URL has Apps Script's internal params (no `p`),
          // so we fall back to the server-injected REQUESTED_PAGE +
          // QUERY_PARAMS globals.
          var winParams = new URLSearchParams(window.location.search);
          if (winParams.has('p')) {
            winParams.forEach(function (value, key) {
              if (key === 'token' || key === 'redirect') return;
              inner.set(key, value);
            });
          } else {
            if (REQUESTED_PAGE) inner.set('p', REQUESTED_PAGE);
            for (var k in QUERY_PARAMS) {
              if (!Object.prototype.hasOwnProperty.call(QUERY_PARAMS, k)) continue;
              if (k === 'token' || k === 'redirect') continue;
              inner.set(k, QUERY_PARAMS[k] == null ? '' : String(QUERY_PARAMS[k]));
            }
          }
          var redirectStr = inner.toString();
          if (!redirectStr) return IDENTITY_URL;
          var sep = IDENTITY_URL.indexOf('?') === -1 ? '?' : '&';
          return IDENTITY_URL + sep + 'redirect=' + encodeURIComponent(redirectStr);
        }

        function showLogin(errMsg) {
          hide($('content'));
          show($('login-container'));
          setUserMeta(null);
          setBrand(null);
          setNav('');
          var link = $('signin-link');
          var errEl = $('login-error');
          if (link) {
            if (IDENTITY_URL) {
              // IDENTITY_URL points at the personal-account Identity
              // project's /exec — see identity-project/README.md. The
              // helper appends `&redirect=<encoded>` carrying the current
              // deep-link query (Chunk 11.1) so post-sign-in routing
              // lands the user where they intended.
              link.href = buildIdentityUrl_();
              link.style.pointerEvents = '';
              link.style.opacity = '';
            } else {
              link.removeAttribute('href');
              link.style.pointerEvents = 'none';
              link.style.opacity = '0.4';
              if (!errMsg) {
                errMsg = 'identity_url is not configured. Set ' +
                  'Config.identity_url in the backing Sheet ' +
                  '(see docs/sheet-setup.md).';
              }
            }
          }
          if (errEl) errEl.textContent = errMsg || '';

          // Chunk 11.2: show the first-time-instructions overlay if the
          // user hasn't seen it before in this browser. Returning users
          // (flag === '1') see only the section above with the regular
          // Sign-In button. Any failure path (auth expired, auth invalid,
          // identity_url unconfigured) preserves the flag — we don't
          // re-prompt instructions on retry.
          if (getLoginInstructionsFlag_() !== '1') {
            showInstructionsOverlay_();
          } else {
            hideInstructionsOverlay_();
          }
        }

        // ---------------------------------------------------------
        // Chunk 10.6 — client-side navigation (SPA-style).
        //
        // The initial ApiShared_bootstrap rpc returns EVERY role-allowed
        // page's HTML pre-rendered, in `pageBundle: {pageId → pageHtml}`.
        // The shell stashes the bundle and serves intra-app navigation
        // from it — zero server rpc per click. Each page's init fn still
        // does its own data rpc (that's the "Loading…" placeholder you
        // see) so dynamic content stays fresh.
        //
        // State we carry across intra-app swaps:
        //   - currentPageId — last-rendered pageId; keys teardown +
        //     nav-active.
        //   - currentPrincipal — from bootstrap; reused to build
        //     pageModel for each swap (identical shape to what
        //     Router_pick produces server-side).
        //   - pageBundle — {pageId → pageHtml}. Populated on bootstrap;
        //     stale if roles change mid-session (rare — requires an
        //     LCR change + import run). User reloads to refresh.
        //   - navReady — flips true after the initial bootstrap render
        //     completes; guards the delegated click + popstate handlers
        //     against pre-render clicks.
        // ---------------------------------------------------------
        var currentPageId       = '';
        var currentQueryParams  = {};
        var currentPrincipal    = null;
        var pageBundle          = {};
        var navReady            = false;

        // Chunk 10.6: detached-pane cache for "keep tabs alive across
        // switches". Each entry is { pane: <DOM>, queryParams: {…} }.
        // When we nav away, the current pane is detached (not
        // destroyed) and stashed here; when we nav back, the pane is
        // re-attached with its listeners, form state, and scroll
        // position intact — no re-init, no re-fetch. Detached nodes
        // aren't visible to document.getElementById, so duplicate IDs
        // across tabs don't collide.
        //
        // Invalidation is how mutations tell the shell "previously-
        // cached state is stale":
        //   - window.invalidatePage(pageId)  — drops one tab's cache.
        //   - window.invalidateAllPages()    — drops every cache entry.
        // Neither touches the currently-rendered tab (which isn't in
        // cachedPanes by definition — it's live in #content). Pages
        // that need to refresh themselves after an action call their
        // own load() / refresh() helper directly.
        var cachedPanes = {};

        function qpEquals_(a, b) {
          a = a || {}; b = b || {};
          var ka = Object.keys(a), kb = Object.keys(b);
          if (ka.length !== kb.length) return false;
          for (var i = 0; i < ka.length; i++) {
            if (a[ka[i]] !== b[ka[i]]) return false;
          }
          return true;
        }

        window.invalidatePage = function (pageId) {
          if (cachedPanes.hasOwnProperty(pageId)) {
            delete cachedPanes[pageId];
          }
        };
        window.invalidateAllPages = function () {
          cachedPanes = {};
        };

        // pageId → init-fn name. 'mgr/seats' → 'page_mgr_seats_init';
        // 'new' → 'page_new_init'; 'stake/ward-rosters' →
        // 'page_stake_ward_rosters_init'. Both `/` and `-` map to `_`
        // because hyphens aren't valid in JS identifiers and the only
        // hyphenated pageId today is stake/ward-rosters. See
        // architecture.md §8.5 "Per-page init-function convention".
        function initFnName(pageId) {
          return 'page_' + String(pageId || '').replace(/[\/\-]/g, '_') + '_init';
        }
        function teardownFnName(pageId) {
          return 'page_' + String(pageId || '').replace(/[\/\-]/g, '_') + '_teardown';
        }

        function callPageInit(pageId, pageModel, queryParams, pane) {
          var name = initFnName(pageId);
          var fn = window[name];
          if (typeof fn !== 'function') return;
          try {
            // The `pane` arg is the page's root element (the
            // <div class="tab-pane">…</div> wrapper). Pages scope
            // their DOM queries to it so that rpc callbacks firing
            // after a tab-swap still find their own elements — the
            // pane stays in memory even when detached from the
            // document.
            fn(pageModel || {}, queryParams || {}, pane || null);
          } catch (e) {
            try { console.error('[nav] ' + name + ' threw:', e); } catch (_) {}
            toast('Page init failed: ' + ((e && e.message) || String(e)), 'error');
          }
        }

        function callPageTeardown(pageId) {
          if (!pageId) return;
          var name = teardownFnName(pageId);
          var fn = window[name];
          if (typeof fn !== 'function') return;
          try { fn(); }
          catch (e) { try { console.error('[nav] ' + name + ' threw:', e); } catch (_) {} }
        }

        // Update the nav-active class on data-page links to match the
        // currently-rendered pageId. Nav.html's server-rendered markup
        // already carries `class="nav-link active"` for the initial
        // page; after a swap we need to keep it in sync.
        function updateNavActive(pageId) {
          var host = $('nav-host');
          if (!host) return;
          var links = host.querySelectorAll('.nav-link[data-page]');
          for (var i = 0; i < links.length; i++) {
            links[i].classList.toggle('active',
              links[i].getAttribute('data-page') === pageId);
          }
        }

        // Pull per-page query params out of a link's href. Nav and
        // dashboard deep-links build hrefs as MAIN_URL + '?p=<pageId>
        // &ward=CO&...'; the interceptor extracts the search params and
        // hands them to navigateTo (minus 'p' and 'token', which the
        // shell owns — same strip set Main.doGet applies server-side).
        function parseHrefParams(href) {
          var out = {};
          if (!href) return out;
          var i = href.indexOf('?');
          if (i < 0) return out;
          var qs = href.substring(i + 1);
          var hashAt = qs.indexOf('#');
          if (hashAt >= 0) qs = qs.substring(0, hashAt);
          var parts = qs.split('&');
          for (var p = 0; p < parts.length; p++) {
            if (!parts[p]) continue;
            var kv = parts[p].split('=');
            var k = decodeURIComponent(kv[0] || '');
            var v = kv.length > 1 ? decodeURIComponent((kv[1] || '').replace(/\+/g, ' ')) : '';
            if (!k || k === 'p' || k === 'token') continue;
            out[k] = v;
          }
          return out;
        }

        // Build a relative URL that encodes pageId + its query params.
        // Used for history.pushState / replaceState so back/forward work
        // AND the iframe URL reflects the current filter state (a free
        // feature we pick up from pushState; the top-frame URL bar
        // stays frozen — see architecture.md §8.5 "History API
        // boundaries").
        function buildStateUrl(pageId, queryParams) {
          var parts = ['p=' + encodeURIComponent(pageId || '')];
          if (queryParams && typeof queryParams === 'object') {
            for (var k in queryParams) {
              if (!queryParams.hasOwnProperty(k)) continue;
              if (k === 'p' || k === 'token') continue;
              var v = queryParams[k];
              if (v == null || v === '') continue;
              parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(v)));
            }
          }
          return '?' + parts.join('&');
        }

        // Build a fresh pane for a pageId: create the wrapper, inject
        // the cached HTML from pageBundle, rehydrate scripts (which
        // defines window.page_<X>_init), and return the pane. NOT
        // attached to the DOM yet — caller decides when to attach.
        function buildPane_(pageId) {
          var pane = document.createElement('div');
          pane.className = 'tab-pane';
          pane.setAttribute('data-page-id', pageId);
          pane.innerHTML = pageBundle[pageId] || '';
          return pane;
        }

        // The star of Chunk 10.6. Called on nav-link clicks, on
        // popstate (back/forward), and on the initial post-bootstrap
        // path. ZERO rpc — the pageHtml comes from the bundle the
        // bootstrap already delivered.
        //
        // Keep-alive model: the outgoing tab's DOM is DETACHED (not
        // destroyed) and stashed in cachedPanes. If the target tab
        // has a cache entry with matching queryParams, we re-attach
        // its cached DOM and skip init — the page's populated state
        // (listeners, form inputs, scroll position) is preserved. On
        // cache miss (first visit, post-invalidation, or different
        // queryParams) we build a fresh pane and call init, which
        // fires the page's own data rpc.
        //
        // opts.skipPushState is set by the popstate handler (the
        // browser already updated its stack).
        function navigateTo(pageId, queryParams, opts) {
          opts = opts || {};
          if (!navReady) return;
          queryParams = queryParams || {};
          if (pageBundle[pageId] == null) {
            // Shouldn't happen — Nav.html only renders role-allowed
            // links, and Dashboard / Import deep-links are also role-
            // gated. If we hit this, something's out of sync (stale
            // bundle after a role change? bogus hand-crafted data-page
            // attr?). Toast + fall back to a full reload.
            try { console.error('[nav] pageId not in bundle: ' + pageId); } catch (_) {}
            toast('Unknown page: ' + pageId + ' — reloading.', 'error');
            if (MAIN_URL) {
              try {
                window.top.location.replace(
                  MAIN_URL + '?p=' + encodeURIComponent(pageId)
                );
              } catch (_) {}
            }
            return;
          }

          // Detach the OUTGOING tab into the cache. Teardown fires
          // before the detach so it can still query the document if
          // it needs to (though none currently do — NewRequest's
          // teardown just cancels a debounce timer). On nav-back to
          // this tab the DOM is restored but teardown does NOT have
          // a corresponding re-init; pages that need "re-awake on
          // re-attach" behaviour would have to explicitly wire it.
          if (currentPageId) callPageTeardown(currentPageId);
          var outgoingPane = $('content').firstElementChild;
          if (outgoingPane && currentPageId) {
            cachedPanes[currentPageId] = {
              pane: outgoingPane,
              queryParams: currentQueryParams
            };
            outgoingPane.remove();
          }

          // Look up target. Cache hit only if the queryParams also
          // match — a deep-link with filter params shouldn't re-use
          // an earlier unfiltered view (and vice versa).
          var cached = cachedPanes[pageId];
          var usingCache = !!(cached && qpEquals_(cached.queryParams, queryParams));
          var incomingPane;
          if (usingCache) {
            incomingPane = cached.pane;
            delete cachedPanes[pageId];
          } else {
            // Fresh build — drop any stale cache entry.
            if (cached) delete cachedPanes[pageId];
            incomingPane = buildPane_(pageId);
          }

          $('content').appendChild(incomingPane);
          show($('content'));

          // Keep QUERY_PARAMS backwards-compatible with pages that
          // still read it as a global (the Chunk-5 contract).
          try {
            QUERY_PARAMS = queryParams;
            window.QUERY_PARAMS = queryParams;
          } catch (_) {}
          currentPageId      = pageId;
          currentQueryParams = queryParams;
          updateNavActive(pageId);
          if (!opts.skipPushState) {
            try {
              history.pushState(
                { pageId: pageId, queryParams: queryParams },
                '',
                buildStateUrl(pageId, queryParams)
              );
            } catch (_) {}
          }

          if (!usingCache) {
            // Rehydrate scripts inside the newly-attached pane —
            // defines window.page_<X>_init on window. Then call init,
            // which fires the page's own data rpc (showing its
            // "Loading…" placeholder in the pane).
            rehydrateScripts(incomingPane);
            var pageModel = { principal: currentPrincipal, current_page: pageId };
            callPageInit(pageId, pageModel, queryParams, incomingPane);
          }
          // On cache hit: init is intentionally NOT re-run. The pane's
          // DOM and its attached listeners survived the detach; the
          // user sees the page in whatever state they left it.
        }

        // Global click interception. An anchor with data-page is a
        // client-side-nav target; anything else (mailto:, external
        // links, same-page anchors without data-page) falls through to
        // normal browser handling. Modifier-clicks (cmd/ctrl/shift/alt)
        // and non-primary buttons skip interception too so
        // "open in new tab" keeps working.
        function findNavLink(target) {
          while (target && target.nodeType && target !== document.body) {
            if (target.nodeName === 'A' && target.hasAttribute && target.hasAttribute('data-page')) {
              return target;
            }
            target = target.parentNode;
          }
          return null;
        }
        document.addEventListener('click', function (ev) {
          if (ev.defaultPrevented) return;
          if (ev.button !== 0) return;
          if (ev.metaKey || ev.ctrlKey || ev.shiftKey || ev.altKey) return;
          var link = findNavLink(ev.target);
          if (!link) return;
          ev.preventDefault();
          var pageId = link.getAttribute('data-page') || '';
          var params = parseHrefParams(link.getAttribute('href') || '');
          navigateTo(pageId, params);
        });

        window.addEventListener('popstate', function (ev) {
          if (!navReady) return;
          var s = ev.state || {};
          var pageId = s.pageId || currentPageId;
          var queryParams = s.queryParams || {};
          navigateTo(pageId, queryParams, { skipPushState: true });
        });

        function showContent(html, principal, navHtml, pageId, pageModel, bundle, stakeName) {
          // Wrap the initial page's HTML in a tab-pane div so it
          // matches the structure navigateTo produces and can be
          // detached-cached on the first nav-away. The pageBundle
          // field from the server typically contains pageId's HTML
          // too (identical bytes); we prefer `html` verbatim so
          // bootstrap / setup-in-progress / no-roles pages (which
          // aren't in the bundle) still land in the same shape.
          pageBundle = bundle || {};
          var initialPane = document.createElement('div');
          initialPane.className = 'tab-pane';
          initialPane.setAttribute('data-page-id', pageId || '');
          initialPane.innerHTML = html;
          $('content').innerHTML = '';
          $('content').appendChild(initialPane);
          // <script> tags injected via innerHTML are inert per HTML spec —
          // the browser parses them but never executes them. Page modules
          // rely on inline <script> blocks (defining their exported init
          // fns, which the shell then calls), so we have to clone each
          // script into a fresh element and re-insert it for the browser
          // to run it.
          rehydrateScripts(initialPane);
          show($('content'));
          hide($('login-container'));
          setUserMeta(principal);
          setBrand(stakeName);
          setNav(navHtml || '');
          currentPrincipal   = principal;
          currentPageId      = pageId || '';
          currentQueryParams = QUERY_PARAMS || {};
          navReady           = true;
          updateNavActive(currentPageId);
          // Attach initial state to the current history entry so the
          // first popstate has something to read (browsers don't do
          // this automatically).
          try {
            history.replaceState(
              { pageId: currentPageId, queryParams: currentQueryParams },
              '',
              window.location.href
            );
          } catch (_) {}
          // Run the page's init function. Initial-load pages reach the
          // same entry point as intra-app-nav pages; identical state
          // regardless of how the page was reached.
          callPageInit(currentPageId, pageModel, currentQueryParams, initialPane);

          // Background preload. Fire the init rpcs for the role's
          // most-likely next tabs so first visit is an instant
          // cache-hit attach instead of incurring ~1s of rpc round-
          // trip. Yielded via setTimeout so the initial page's own
          // init rpc (which is racing on the same Apps Script
          // backend) gets the first slot on the network.
          setTimeout(function () {
            preloadPanesForRole_(principal, currentPageId);
          }, 0);
        }

        // Build the target pane, attach it to the offscreen
        // #preload-staging container, rehydrate its scripts (which
        // defines window.page_<X>_init — HTML spec: inline <script>
        // elements only execute when connected to a Document, so
        // preload has to attach somewhere, not stay detached), call
        // init, and stash the reference into cachedPanes. The next
        // navigateTo to this pageId will find the cache and skip
        // re-init — data already in the pane's DOM. appendChild on
        // #content implicitly re-parents the pane out of staging,
        // so nothing extra to undo. Safe to call multiple times;
        // re-entrancy is guarded by the cachedPanes[pageId] check.
        // Empty queryParams: preloaded panes are for the "no filter"
        // default view only. A deep-link with filter params will
        // miss the cache and build fresh (correct behaviour —
        // unfiltered data can't safely render a filtered view).
        function preloadPane_(pageId) {
          if (cachedPanes[pageId]) return;
          if (pageBundle[pageId] == null) return;
          var staging = $('preload-staging');
          if (!staging) return;  // defensive — shell markup drift
          var pane = buildPane_(pageId);
          staging.appendChild(pane);
          rehydrateScripts(pane);
          var pageModel = { principal: currentPrincipal, current_page: pageId };
          callPageInit(pageId, pageModel, {}, pane);
          cachedPanes[pageId] = { pane: pane, queryParams: {} };
        }

        // Per-role list of tabs to preload. Chosen by "likely next
        // click after the initial page": requesters go to MyRequests;
        // stake principals also hit the stake rosters + ward rosters
        // dropdown; bishopric-only users see their ward roster;
        // managers live in the Requests Queue.
        //
        // Deliberately does NOT preload every role-allowed tab — some
        // (Dashboard, All Seats, Audit Log, Import) are heavier reads
        // and less-frequently-revisited, and paying their rpc cost up
        // front on every login would hurt time-to-interactive for the
        // initial page.
        function preloadPanesForRole_(principal, initialPageId) {
          if (!navReady || !principal || !principal.roles) return;
          var isBishopric = false, isStake = false, isManager = false;
          for (var i = 0; i < principal.roles.length; i++) {
            var r = principal.roles[i];
            if      (r.type === 'bishopric') isBishopric = true;
            else if (r.type === 'stake')     isStake     = true;
            else if (r.type === 'manager')   isManager   = true;
          }
          var queue = [];
          function enqueue(p) {
            if (!p || p === initialPageId) return;
            if (queue.indexOf(p) !== -1) return;
            queue.push(p);
          }
          if (isBishopric || isStake) enqueue('my');
          if (isStake) {
            enqueue('stake/roster');
            enqueue('stake/ward-rosters');
          }
          // Nav.html suppresses the bishopric Ward Roster link when
          // the user also holds stake (Ward Rosters covers it). Match
          // that rule here so we don't warm a tab the nav doesn't
          // surface.
          if (isBishopric && !isStake) enqueue('bishopric/roster');
          if (isManager) enqueue('mgr/queue');
          for (var j = 0; j < queue.length; j++) preloadPane_(queue[j]);
        }

        function rehydrateScripts(root) {
          var scripts = root.querySelectorAll('script');
          for (var i = 0; i < scripts.length; i++) {
            var oldScript = scripts[i];
            var newScript = document.createElement('script');
            // Copy attributes (src, type, etc.) so external-script tags
            // and module declarations work too.
            for (var a = 0; a < oldScript.attributes.length; a++) {
              var attr = oldScript.attributes[a];
              newScript.setAttribute(attr.name, attr.value);
            }
            if (!oldScript.src) newScript.textContent = oldScript.textContent;
            oldScript.parentNode.replaceChild(newScript, oldScript);
          }
        }

        function showError(msg) {
          $('content').innerHTML =
            '<div class="error"><strong>Error:</strong> ' + escapeHtml(msg) + '</div>';
          show($('content'));
          hide($('login-container'));
          setUserMeta(null);
          setBrand(null);
          setNav('');
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        // Cheap client-side expiry check on the HMAC token's exp claim.
        // Token format: <base64url(payload)>.<base64url(sig)> — two segments,
        // unlike a JWT's three. Server-side Auth_verifySessionToken is the
        // authority; this is just to skip a server round-trip on dead tokens.
        function isExpired(token) {
          try {
            var parts = token.split('.');
            if (parts.length !== 2) return true;
            var b64 = parts[0].replace(/-/g, '+').replace(/_/g, '/');
            while (b64.length % 4) b64 += '=';
            var payload = JSON.parse(atob(b64));
            if (typeof payload.exp !== 'number') return true;
            return (payload.exp * 1000) < Date.now();
          } catch (e) {
            return true;
          }
        }

        function proceedWithToken() {
          var token = sessionStorage.getItem('jwt');
          if (!token || isExpired(token)) {
            if (token) sessionStorage.removeItem('jwt');
            showLogin();
            return;
          }
          var requestedPage = REQUESTED_PAGE || '';
          $('content').innerHTML = 'Loading…';
          show($('content'));
          hide($('login-container'));
          rpc('ApiShared_bootstrap', requestedPage).then(function (resp) {
            var initialPageId = (resp && resp.pageModel && resp.pageModel.current_page) || '';
            showContent(resp.pageHtml, resp.principal, resp.navHtml,
              initialPageId, resp.pageModel, resp.pageBundle, resp.stake_name);
          }).catch(function (err) {
            var msg = (err && err.message) ? err.message : String(err);
            if (msg.indexOf('AuthExpired') !== -1 || msg.indexOf('AuthInvalid') !== -1) {
              sessionStorage.removeItem('jwt');
              showLogin('Your session expired. Please sign in again.');
            } else if (msg.indexOf('AuthNotConfigured') !== -1) {
              showError('App not configured: session_secret missing in the Config tab.');
            } else if (msg.indexOf('Forbidden') !== -1) {
              showError('You are not authorised for that action.');
            } else {
              showError(msg);
            }
          });
        }

        function boot() {
          // Just landed from the Identity deployment with a verified token?
          if (INJECTED_TOKEN) {
            sessionStorage.setItem('jwt', INJECTED_TOKEN);
            // Pre-Chunk-11.1 this branch did
            // `window.top.location.replace(MAIN_URL)` to strip ?token=
            // from the user-visible address bar by force-reloading the
            // top frame. Chunk 11.1 closes that need: the wrapper at
            // kindoo.csnorth.org runs an inline script that intercepts
            // the post-auth landing URL, routes the token into the
            // iframe URL only (where it is not user-visible inside
            // Apps Script's nested-iframe structure), and history.
            // replaceState's the wrapper's URL to the original deep-link
            // query (or '/' when there was none). By the time we run
            // here, the address bar is already clean; no top-frame
            // navigation needed. Iframe-side replaceState is also
            // a no-op because the iframe's window.location.search
            // carries Apps Script's internal params, not our ?token=.
            // See docs/changelog/chunk-11.1-auth-url-polish.md.
            proceedWithToken();
            return;
          }
          if (INJECTED_ERR) {
            // Token verification failed server-side. Most often: stale token
            // (exp passed) or session_secret was rotated.
            if (INJECTED_ERR.indexOf('AuthNotConfigured') !== -1) {
              showError('App not configured: session_secret missing in the Config tab. ' +
                'Run setupSheet from the editor to auto-generate one, then re-sign-in.');
            } else if (INJECTED_ERR.indexOf('AuthExpired') !== -1) {
              showLogin('Your sign-in token expired. Please sign in again.');
            } else if (INJECTED_ERR.indexOf('AuthInvalid') !== -1) {
              showLogin('Your sign-in token was rejected. Please sign in again.');
            } else {
              showError(INJECTED_ERR);
            }
            return;
          }
          proceedWithToken();
        }

        boot();
      })();
    </script>
  </body>
</html>
