<style>
  /* Design tokens (DESIGN_REFACTOR.md §1). Airy light chrome + muted
     semantics. Surface/fg tokens are inferred from historical hex
     literals so the section-4 config-tab rules have values to bind. */
  :root {
    --kd-primary:           #2b6cb0;
    --kd-primary-hover:     #2c5282;
    --kd-primary-nav:       #ffffff;
    --kd-primary-tint:      #ebf4fb;
    --kd-primary-tint-link: #9fc1ff;

    --kd-chrome-border:     #e5e7eb;
    --kd-chrome-fg:         #1a1d23;
    --kd-chrome-fg-muted:   #6b7280;

    --kd-surface-alt:       #f3f5fa;
    --kd-border:            #d8dbe4;
    --kd-border-soft:       #eef0f5;
    --kd-fg-1:              #1d2333;
    --kd-fg-2:              #4b5266;

    --kd-success:           #4a8560;
    --kd-success-dark:      #3a6b4c;
    --kd-success-tint:      #e6f3ea;
    --kd-success-fg:        #2f6f47;
    --kd-success-bg:        #f4faf6;
    --kd-success-br:        #c4ddcc;

    --kd-danger:            #a85450;
    --kd-danger-dark:       #8a4340;
    --kd-danger-alt:        #923834;
    --kd-danger-red:        #c25858;
    --kd-danger-tint:       #f5e4e4;
    --kd-danger-fg:         #923834;
    --kd-danger-fg-2:       #6b2a2a;
    --kd-danger-fg-3:       #9a4a4a;
    --kd-danger-bg:         #faf0f0;

    /* PART2 §3 additions — row tints, warn family, tertiary fg. */
    --kd-row-auto:          #fafbff;
    --kd-row-temp:          #fff8ea;
    --kd-warn-tint:         #ffe3c2;
    --kd-warn-dark:         #7a4400;
    --kd-warn-tint-2:       #fde4a1;
    --kd-warn-mid:          #6b4a00;
    --kd-fg-3:              #6b7280;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #1d2333;
    background: #f7f8fb;
    line-height: 1.45;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #fff;
    color: var(--kd-chrome-fg);
    border-bottom: 1px solid var(--kd-chrome-border);
  }
  .topbar .brand {
    color: var(--kd-primary);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar .brand-icon {
    height: 1.5em;
    width: 1.5em;
    flex-shrink: 0;
    display: block;
  }
  .topbar .user-meta { color: var(--kd-chrome-fg-muted); font-size: 0.9em; }
  main {
    padding: 24px 20px;
    margin: 0;
    width: 100%;
    max-width: 900px;
    box-sizing: border-box;
  }

  /* Per-page max-widths (DESIGN_REFACTOR_PART2.md §2). Default pages
     stay at 900px (inherited from main); data-dense pages unlock more
     room at two big-screen breakpoints so tables don't stay jailed on
     ultrawides. */
  .dashboard-page,
  .all-seats-page,
  .audit-log-page,
  .queue-page,
  .roster-page { max-width: 900px; }

  @media (min-width: 1100px) {
    .dashboard-page,
    .all-seats-page,
    .audit-log-page { max-width: 1200px; }
    .queue-page,
    .roster-page    { max-width: 1100px; }
    .config-page    { max-width: 1000px; }
  }
  @media (min-width: 1600px) {
    .dashboard-page,
    .all-seats-page,
    .audit-log-page { max-width: 1440px; }
  }
  h1 { margin: 0 0 12px; font-size: 1.5em; }
  .hidden { display: none; }
  .error { color: #a85450; }
  .login p { color: #4b5266; max-width: 56ch; }
  .hello ul { padding-left: 22px; }
  .hello li { margin: 4px 0; }
  .scaffold-note { opacity: 0.6; font-size: 0.85em; margin-top: 24px; }
  code {
    background: #eef0f5;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.95em;
  }
  .not-authorized ul { color: #4b5266; }
  .signin-button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    font-size: 1em;
    font-family: inherit;
    font-weight: 500;
    background: #ffffff;
    color: #3c4043;
    border: 1px solid #dadce0;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 1px 1px rgba(0, 0, 0, 0.06);
  }
  .signin-button:hover  { background: #f8f9fa; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.10); }
  .signin-button:focus  { outline: 2px solid #1a73e8; outline-offset: 2px; }
  a.signin-button       { text-decoration: none; cursor: pointer; }
  a.signin-button:hover { text-decoration: none; }
  .login-hint {
    color: #4b5266;
    font-size: 0.9em;
    max-width: 56ch;
    margin-top: 16px;
  }
  .signin-button-icon {
    display: inline-block;
    width: 18px; height: 18px;
    border-radius: 2px;
    background: #4285f4;
    color: #ffffff;
    text-align: center;
    line-height: 18px;
    font-weight: 700;
    font-size: 12px;
  }
  .version-stamp {
    font-size: 0.65em;
    color: #a0a4b1;
    text-align: center;
    padding: 6px 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    user-select: all;
  }

  /* Toast notifications (ClientUtils.html#toast). */
  .toast-host {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 1000;
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
    max-width: min(420px, calc(100vw - 32px));
    pointer-events: none;
  }
  .toast {
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 0.92em;
    background: #1d2333;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    pointer-events: auto;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .toast-leaving { opacity: 0; transform: translateY(-6px); }
  .toast-info    { background: #2b6cb0; }
  .toast-success { background: #4a8560; }
  .toast-warn    { background: #b76d00; }
  .toast-error   { background: #a85450; }

  /* Manager Config page (Chunk 2 · refactored DESIGN_REFACTOR.md §4;
     max-width lives in the §2 breakpoint block above). */
  .config-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    background: var(--kd-surface-alt);
    border: 1px solid var(--kd-border);
    border-bottom: none;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    padding: 6px 8px 0;
    margin: 6px 0 0;
    align-items: flex-end;
  }
  .config-tab-btn {
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    padding: 7px 14px 8px;
    font: inherit;
    font-size: 0.92em;
    color: var(--kd-fg-2);
    cursor: pointer;
    position: relative;
    top: 1px;
  }
  .config-tab-btn:hover:not(.active) {
    background: rgba(0,0,0,0.04);
    color: var(--kd-fg-1);
    border-color: var(--kd-border-soft);
  }
  .config-tab-btn.active {
    background: #fff;
    color: var(--kd-primary);
    font-weight: 600;
    border-color: var(--kd-border);
    padding-bottom: 9px;
  }
  .config-tab-panel {
    display: none;
    background: #fff;
    border: 1px solid var(--kd-border);
    border-top: none;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .config-tab-panel.active { display: block; }

  .config-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    overflow: hidden;
  }
  .config-table th, .config-table td {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid #eef0f5;
    font-size: 0.92em;
    vertical-align: middle;
  }
  .config-table th { background: #f3f5fa; font-weight: 600; color: #4b5266; }
  .config-table tbody tr:last-child td { border-bottom: none; }
  .config-table input[type="text"],
  .config-table input[type="number"],
  .config-table input[type="email"] {
    width: 100%;
    padding: 4px 6px;
    border: 1px solid #c8ccd6;
    border-radius: 3px;
    font-family: inherit;
    font-size: inherit;
    box-sizing: border-box;
  }
  .config-table input[readonly] {
    background: #f3f5fa;
    color: #6b7280;
    cursor: not-allowed;
  }
  .config-table .row-actions {
    white-space: nowrap;
    text-align: right;
  }
  .btn {
    background: #2b6cb0;
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.9em;
    cursor: pointer;
  }
  .btn:hover  { background: #2c5282; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-secondary {
    background: #fff;
    color: #2b6cb0;
    border: 1px solid #c8ccd6;
  }
  .btn-secondary:hover { background: #f3f5fa; }
  .btn-success {
    background: var(--kd-success);
    color: #fff;
    border: none;
  }
  .btn-success:hover { background: var(--kd-success-dark); }
  .btn-danger {
    background: var(--kd-danger);
    color: #fff;
    border: none;
  }
  .btn-danger:hover { background: var(--kd-danger-dark); }
  .add-row-form {
    margin-top: 14px;
    padding: 14px;
    background: #f3f5fa;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
  }
  .add-row-form h3 { margin: 0 0 10px; font-size: 1em; }
  .add-row-form .form-grid {
    display: grid;
    gap: 8px 12px;
    align-items: center;
  }
  .add-row-form label {
    font-size: 0.9em;
    color: #4b5266;
  }
  .add-row-form .form-actions {
    margin-top: 10px;
    text-align: right;
  }
  .config-readonly-note {
    color: #6b7280;
    font-size: 0.85em;
    margin: 8px 0 16px;
  }
  .config-readonly-badge {
    display: inline-block;
    padding: 2px 6px;
    background: #eef0f5;
    color: #6b7280;
    border-radius: 3px;
    font-size: 0.78em;
    margin-left: 6px;
  }
  .config-key-hint {
    color: #6b7280;
    font-size: 0.82em;
    margin-top: 4px;
    max-width: 52ch;
  }

  /* Manager Config — Triggers panel (Chunk 8). */
  .triggers-panel {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 14px;
    margin-top: 8px;
  }
  .triggers-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
  }
  .triggers-status {
    color: #4b5266;
    font-size: 0.9em;
  }
  .triggers-list-ul {
    margin: 0;
    padding-left: 18px;
    font-size: 0.9em;
  }
  .triggers-list-ul li { margin: 2px 0; }
  .triggers-meta { color: #6b7280; font-size: 0.85em; }

  /* Manager Config — Cache stats panel (Chunk 10.5). Same visual vocab as
     the Triggers panel above so the two read as a consistent pair. */
  .cache-panel {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 14px;
    margin-top: 8px;
  }
  .cache-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
  }
  .cache-status { color: #4b5266; font-size: 0.9em; }
  .cache-aggregate {
    font-size: 0.9em;
    color: #4b5266;
    margin-bottom: 10px;
  }
  .cache-keys { font-size: 0.9em; }
  .cache-keys td:nth-child(2),
  .cache-keys td:nth-child(3),
  .cache-keys td:nth-child(4),
  .cache-keys td:nth-child(5) { text-align: right; font-variant-numeric: tabular-nums; }
  .empty-state {
    color: #6b7280;
    padding: 14px;
    text-align: center;
    background: #fff;
    border: 1px dashed #d8dbe4;
    border-radius: 6px;
  }

  /* Manager Import page (Chunk 3). */
  .import-page { max-width: 800px; }
  .import-intro { color: #4b5266; max-width: 60ch; }
  .import-card {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 18px;
    margin-top: 14px;
  }
  .import-actions { display: flex; gap: 12px; align-items: center; }
  .import-spinner { color: #4b5266; font-size: 0.9em; }
  .import-status {
    display: grid;
    grid-template-columns: max-content 1fr;
    column-gap: 16px;
    row-gap: 6px;
    margin: 18px 0 0;
  }
  .import-status dt { color: #4b5266; font-size: 0.9em; }
  .import-status dd { margin: 0; word-break: break-word; }
  .import-warnings { margin-top: 14px; }
  .import-warnings summary { cursor: pointer; color: #b76d00; }
  .import-warnings ul { margin: 8px 0 0; padding-left: 20px; color: #4b5266; font-size: 0.9em; }

  /* Over-cap banner (Chunk 9). Red for urgency; sits above the import
     card so a manager opening the page sees it before the click target. */
  .over-cap-banner {
    background: #faf0f0;
    border: 1px solid #c25858;
    border-left: 4px solid #c25858;
    border-radius: 6px;
    padding: 14px 18px;
    margin: 14px 0;
    color: #923834;
  }
  .over-cap-heading {
    margin: 0 0 6px;
    font-size: 1em;
    font-weight: 600;
    color: #923834;
  }
  .over-cap-intro { margin: 0 0 10px; font-size: 0.9em; color: #6b2a2a; }
  .over-cap-list { margin: 0; padding-left: 20px; font-size: 0.95em; }
  .over-cap-list li { margin: 4px 0; }
  .over-cap-pool-label { font-weight: 600; }
  .over-cap-pool-counts { font-variant-numeric: tabular-nums; }
  .over-cap-pool-overby { color: #9a4a4a; font-size: 0.9em; }
  .over-cap-pool-link {
    margin-left: 8px;
    color: #923834;
    text-decoration: underline;
  }
  .over-cap-pool-link:hover { color: #c25858; }

  /* Manager Access page (Chunk 3). */
  .access-page { max-width: 900px; }
  .access-intro { color: #4b5266; max-width: 60ch; }
  .access-toolbar {
    display: flex;
    gap: 16px;
    align-items: center;
    margin: 14px 0;
  }
  .access-count { color: #6b7280; font-size: 0.9em; }
  .access-source-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.78em;
  }
  .access-source-importer { background: #eef0f5; color: #6b7280; }
  .access-source-manual   { background: #ffe3c2; color: #7a4400; }

  /* Bootstrap wizard (Chunk 4). */
  .bootstrap-wizard { max-width: 900px; }
  .wizard-intro { color: #4b5266; max-width: 60ch; }
  .wizard-steps {
    display: flex;
    gap: 4px;
    margin: 20px 0 18px;
    flex-wrap: wrap;
  }
  .wizard-step {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.92em;
    color: #4b5266;
    cursor: pointer;
  }
  .wizard-step:hover { background: #f3f5fa; }
  .wizard-step.active {
    border-color: #2b6cb0;
    color: #2b6cb0;
    font-weight: 600;
  }
  .wizard-step.complete { background: #f4faf6; border-color: #c4ddcc; }
  .wizard-step.complete.active { background: #fff; }
  .wizard-step-num {
    display: inline-block;
    width: 22px; height: 22px;
    background: #eef0f5;
    border-radius: 50%;
    text-align: center;
    line-height: 22px;
    font-size: 0.82em;
    font-weight: 600;
  }
  .wizard-step.active .wizard-step-num { background: #2b6cb0; color: #fff; }
  .wizard-step.complete .wizard-step-num { background: #4a8560; color: #fff; }
  .wizard-step-check { color: #4a8560; font-weight: 700; }
  .wizard-step-label { }
  .wizard-step-optional {
    font-size: 0.82em;
    color: #6b7280;
    font-weight: 400;
    margin-left: 6px;
  }
  .wizard-panel {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 20px;
  }
  .wizard-panel h2 { margin: 0 0 6px; font-size: 1.15em; }
  .wizard-step-intro {
    color: #4b5266;
    margin: 6px 0 16px;
  }
  .wizard-form {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 10px 14px;
    align-items: center;
    max-width: 640px;
  }
  .wizard-form label {
    color: #4b5266;
    font-size: 0.92em;
  }
  .wizard-form input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #c8ccd6;
    border-radius: 3px;
    font-family: inherit;
    font-size: inherit;
  }
  .wizard-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    justify-content: flex-end;
  }
  .wizard-finish { margin-top: 18px; }
  .wizard-finish-card {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
  }
  .wizard-finish-card p { margin: 0; color: #4b5266; flex: 1; min-width: 280px; }
  .wizard-complete-btn {
    background: #4a8560;
    font-size: 1em;
    padding: 10px 18px;
  }
  .wizard-complete-btn:hover:not([disabled]) { background: #3a6b4c; }

  /* Wizard pending-row indicators (Chunk 4 batch-write UX). */
  .wizard-step-pending {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 6px;
    background: #b76d00;
    color: #fff;
    border-radius: 3px;
    font-size: 0.75em;
    font-weight: 600;
  }
  .pending-row td { background: #fff8ea; }
  .pending-badge {
    display: inline-block;
    padding: 2px 6px;
    background: #b76d00;
    color: #fff;
    border-radius: 3px;
    font-size: 0.78em;
  }
  .saved-badge {
    display: inline-block;
    padding: 2px 6px;
    background: #eef0f5;
    color: #4b5266;
    border-radius: 3px;
    font-size: 0.78em;
  }

  /* Wizard completion-success panel (Chunk 4). */
  .wizard-success { text-align: center; padding: 16px 8px; }
  .wizard-success h2 { color: #4a8560; font-size: 1.3em; margin-top: 8px; }
  .wizard-success p { color: #4b5266; max-width: 56ch; margin: 12px auto; }
  a.wizard-continue-btn {
    display: inline-block;
    background: #4a8560;
    color: #fff;
    padding: 10px 20px;
    font-size: 1em;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
  }
  a.wizard-continue-btn:hover { background: #3a6b4c; text-decoration: none; }

  /* SetupInProgress page (Chunk 4). */
  .setup-in-progress { max-width: 720px; }
  .setup-in-progress p { color: #4b5266; max-width: 60ch; }

  /* Nav + sign-out (Chunk 5). */
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .signout-btn {
    background: transparent;
    color: var(--kd-primary);
    border: 1px solid var(--kd-chrome-border);
    padding: 4px 10px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.85em;
    cursor: pointer;
  }
  .signout-btn:hover  { background: var(--kd-primary-tint); border-color: var(--kd-primary); }
  .signout-btn:focus  { outline: 2px solid var(--kd-primary); outline-offset: 2px; }
  .nav-host {
    background: var(--kd-primary-nav);
    color: var(--kd-chrome-fg);
    border-bottom: 1px solid var(--kd-chrome-border);
  }
  .app-nav {
    margin: 0;
    padding: 6px 20px 0;
  }
  .nav-links {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    align-items: flex-end;
  }
  .nav-links li { margin: 0; }
  .nav-link {
    display: block;
    padding: 8px 14px 9px;
    color: var(--kd-chrome-fg-muted);
    text-decoration: none;
    font-size: 0.92em;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-top-left-radius: 12px;
    border-top-right-radius: 12px;
    background: transparent;
    position: relative;
    top: 1px;
  }
  .nav-link:hover:not(.active) {
    background: rgba(0,0,0,0.04);
    color: var(--kd-chrome-fg);
  }
  .nav-link.active {
    background: var(--kd-primary-tint);
    color: var(--kd-primary);
    font-weight: 600;
    border-color: var(--kd-chrome-border);
    border-bottom-color: var(--kd-primary-tint);
    padding-bottom: 10px;
  }

  /* Roster pages — shared (Chunk 5). Max-width lives in §2 breakpoints. */
  .roster-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 8px;
  }
  .roster-header h1 { margin: 0; }
  .roster-scope-label { color: #4b5266; font-size: 0.92em; }

  /* Utilization bar. Width tracks the roster-cards stack below it so the
     header and data read as one block. */
  .utilization {
    margin: 12px 0 20px;
    max-width: 820px;
  }
  .utilization-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.9em;
    color: #4b5266;
    margin-bottom: 4px;
  }
  .utilization-label .over-cap-flag {
    color: #a85450;
    font-weight: 600;
  }
  .utilization-bar {
    position: relative;
    height: 10px;
    background: #eef0f5;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid #d8dbe4;
  }
  .utilization-fill {
    height: 100%;
    background: #2b6cb0;
    transition: width 0.2s ease;
  }
  .utilization-fill.over { background: #a85450; }
  .utilization-fill.near { background: #b76d00; }

  /* Roster table. */
  .roster-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    overflow: hidden;
    font-size: 0.92em;
  }
  .roster-table th, .roster-table td {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid #eef0f5;
    vertical-align: top;
  }
  .roster-table th {
    background: #f3f5fa;
    font-weight: 600;
    color: #4b5266;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .roster-table tbody tr:last-child td { border-bottom: none; }
  .roster-table tr.type-auto   td { background: #fafbff; }
  .roster-table tr.type-manual td { background: #ffffff; }
  .roster-table tr.type-temp   td { background: #fff8ea; }

  .roster-email {
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: inline-block;
    vertical-align: bottom;
  }
  .roster-section-header td {
    background: #eef0f5 !important;
    font-weight: 600;
    color: #1d2333;
    padding: 10px;
  }

  /* Roster row badges (type, expired, expires-today). */
  .roster-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.76em;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-type-auto   { background: var(--kd-primary-tint); color: var(--kd-primary); }
  .badge-type-manual { background: var(--kd-warn-tint); color: var(--kd-warn-dark); }
  .badge-type-temp   { background: var(--kd-warn-tint-2); color: var(--kd-warn-mid); }
  .badge-expired       { background: var(--kd-danger-tint); color: var(--kd-danger-alt); margin-left: 6px; }
  .badge-expires-today { background: #ffe3c2; color: #7a4400; margin-left: 6px; }
  .roster-empty {
    color: #6b7280;
    padding: 20px;
    text-align: center;
    background: #fff;
    border: 1px dashed #d8dbe4;
    border-radius: 6px;
  }

  /* PART2 §3 — table↔card swap. Roster-style pages render both a
     desktop <table> and a phone card stack; CSS picks which is visible
     at 899px. No JS viewport sniffing. */
  .responsive-cards-phone   { display: none; }
  .responsive-table-desktop { display: table; }
  @media (max-width: 899px) {
    .responsive-cards-phone   { display: block; }
    .responsive-table-desktop { display: none; }
  }

  /* TASKS.md #2 + PART2 §3 — card-per-row layout. Stacked with no gaps
     (shared bottom border). Flex-row inside each card: badges + member
     + labeled chips + action strip sit inline on wide viewports, wrap
     only when content genuinely overflows. Cap at 820px so the remove
     button clusters with the member name on ultrawides. */
  .roster-cards {
    background: #fff;
    border: 1px solid var(--kd-border);
    border-radius: 6px;
    overflow: hidden;
    font-size: 0.92em;
    max-width: 820px;
  }
  .roster-card {
    padding: 8px 12px;
    border-bottom: 1px solid var(--kd-border-soft);
  }
  .roster-cards .roster-card:last-child { border-bottom: none; }
  .roster-card.type-auto   { background: var(--kd-row-auto); }
  .roster-card.type-manual { background: #ffffff; }
  .roster-card.type-temp   { background: var(--kd-row-temp); }
  .roster-card-line1 {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }
  .roster-card-line2 {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 4px;
    padding-left: 4px;
    color: var(--kd-fg-2);
    font-size: 0.92em;
  }
  .roster-card-badges {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .roster-card-member {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    min-width: 0;
  }
  .roster-card-name {
    font-weight: 600;
    color: var(--kd-fg-1);
  }
  .roster-card-chip {
    color: var(--kd-fg-2);
    white-space: nowrap;
  }
  .roster-card-chip .label {
    color: var(--kd-fg-3);
    font-size: 0.88em;
    margin-right: 4px;
  }
  .roster-card-scope code {
    background: #eef0f5;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.9em;
  }
  .roster-card-actions {
    margin-left: auto;
    display: inline-flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .roster-card.preview-remove {
    text-decoration: line-through;
    color: #923834;
  }
  .roster-card.preview-remove .roster-badge { text-decoration: none; }
  .roster-card.preview-remove .roster-card-line1::before {
    content: "⌫";
    color: #923834;
    margin-right: 4px;
  }
  .roster-card.has-removal-pending { background: #fdf3f5; }

  /* Ward Rosters dropdown page + post-Chunk-10.6 multi-ward bishopric
     Roster picker. Same shape on both so the dropdown-plus-label reads
     identically. Explicit `.hidden` override because the generic
     `.hidden { display: none }` rule (line 22) has equal specificity
     but is declared earlier, so `display: flex` below would otherwise
     win and leave a "hidden" picker visible — matches the same
     pattern used by the modal rows. */
  .ward-select-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin: 14px 0 18px;
  }
  .ward-select-row.hidden { display: none; }
  .ward-rosters-page select,
  .roster-page .ward-select-row select {
    padding: 6px 8px;
    font-family: inherit;
    font-size: inherit;
    border: 1px solid #c8ccd6;
    border-radius: 3px;
    min-width: 220px;
  }

  /* Manager AllSeats filters + per-scope summaries. */
  .all-seats-filters {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    padding: 12px;
    background: #f3f5fa;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    margin: 14px 0;
  }
  .all-seats-filters label {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 0.92em;
    color: #4b5266;
  }
  .all-seats-filters select {
    padding: 4px 6px;
    border: 1px solid #c8ccd6;
    border-radius: 3px;
    font-family: inherit;
    font-size: inherit;
  }
  .all-seats-count {
    color: #4b5266;
    font-size: 0.9em;
  }
  .all-seats-summaries {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  /* Stake-wide seat utilization bar on All Seats — full-width, sits
     between the filter row and the per-scope summary cards, visible
     only when no scope filter is applied. Bar visual reuses the
     .dashboard-util-bar / .dashboard-util-fill from the Dashboard
     utilization card. */
  .overall-utilization-host:empty { display: none; }
  .overall-utilization {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .overall-utilization-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.92em;
    color: #4b5266;
    margin-bottom: 6px;
  }
  .overall-utilization-label {
    font-weight: 600;
    color: #1d2333;
  }
  .all-seats-summary-card {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .all-seats-summary-card .scope-label {
    font-weight: 600;
    font-size: 0.95em;
    color: #1d2333;
    margin-bottom: 6px;
  }

  /* Requests v1 (Chunk 6) — New Request, My Requests, Requests Queue,
     inline seat edit. */

  .new-request-page, .my-requests-page { max-width: 1100px; }
  .requesting-for {
    margin: 6px 0 16px;
    padding: 10px 14px;
    background: #f3f5fa;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    color: #4b5266;
    font-size: 0.95em;
  }
  .requesting-for select { margin-left: 6px; }

  .new-request-form .form-row { margin-bottom: 14px; }
  .new-request-form .form-row.temp-only { display: flex; gap: 14px; }
  /* Generic `.hidden { display: none }` (line 22) has lower specificity
     than the flex rule above, so add an explicit override — same pattern
     as .ward-select-row.hidden. */
  .new-request-form .form-row.temp-only.hidden { display: none; }
  .new-request-form label { color: #4b5266; font-size: 0.92em; }
  .new-request-form input[type="text"],
  .new-request-form input[type="email"],
  .new-request-form input[type="date"],
  .new-request-form select,
  .new-request-form textarea {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #c8ccd6;
    border-radius: 3px;
    font-family: inherit;
    font-size: inherit;
    box-sizing: border-box;
  }
  .new-request-form textarea { resize: vertical; }
  .new-request-form .form-actions { text-align: right; margin-top: 18px; }

  .duplicate-warning {
    margin: 12px 0;
    padding: 12px 14px;
    background: #fff8ea;
    border: 1px solid #b76d00;
    border-radius: 6px;
    color: #5c4100;
    font-size: 0.94em;
  }
  .duplicate-warning strong { color: #7a4400; }
  .duplicate-warning-rows { margin-top: 10px; }
  .duplicate-warning-host:empty { display: none; }

  /* My Requests table. */
  /* MyRequests timestamps footer — Requested/Resolved anchor the
     bottom of the card, rendered smaller + more muted than the other
     line2s so they read as metadata rather than primary content. */
  .roster-card-timestamps {
    color: #6b7280;
    font-size: 0.85em;
  }

  /* My Requests cards — status-driven backgrounds, layout shared with
     .roster-card / .roster-card-line1 / .roster-card-line2. Mirrors
     the RequestsQueue .queue-card-status-* convention so the two
     request-oriented pages read consistently. */
  .my-request-card.status-row-pending   { background: #ffffff; }
  .my-request-card.status-row-complete  { background: #f3fbf4; }
  .my-request-card.status-row-rejected  { background: #fdf3f5; }
  .my-request-card.status-row-cancelled { background: #f5f5f7; color: #6b7280; }

  /* Request-type badges — share the roster-badge shape; colours track
     the roster type semantics: add_manual ≈ manual (amber), add_temp
     ≈ temp (light amber), remove ≈ danger-ish so it's legible as a
     destructive intent. */
  .badge-request-add_manual { background: #ffe3c2; color: #7a4400; }
  .badge-request-add_temp   { background: #fde4a1; color: #6b4a00; }
  .badge-request-remove     { background: #f5e4e4; color: #923834; }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 0.78em;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-pending   { background: #fde4a1; color: #6b4a00; }
  .status-complete  { background: #e6f3ea; color: #2f6f47; }
  .status-rejected  { background: #f5e4e4; color: #923834; }
  .status-cancelled { background: #eef0f5; color: #4b5266; }

  .rejection-reason-hint {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    background: #f5e4e4;
    color: #923834;
    font-size: 0.78em;
    cursor: pointer;
    text-decoration: underline dotted;
  }

  /* Requests Queue. */
  .queue-intro { color: #4b5266; max-width: 60ch; }
  .queue-filters {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    padding: 12px;
    background: #f3f5fa;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    margin: 14px 0;
  }
  .queue-filters label { color: #4b5266; font-size: 0.92em; }
  .queue-filters select {
    margin-left: 6px;
    padding: 4px 6px;
    border: 1px solid #c8ccd6;
    border-radius: 3px;
  }
  .queue-count { color: #4b5266; font-size: 0.9em; }

  .queue-card {
    background: #fff;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  /* Terminal-state cards are read-only; dim slightly so a mixed view
     (if the filter ever lands there) still makes pending cards pop. */
  .queue-card-status-complete  { background: #f3fbf4; }
  .queue-card-status-rejected  { background: #fdf3f5; }
  .queue-card-status-cancelled { background: #f5f5f7; color: #4b5266; }
  .queue-card-header {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .queue-card-type {
    background: #ebf4fb;
    color: #2b6cb0;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 0.85em;
    font-weight: 600;
  }
  .queue-card-submitted { color: #6b7280; font-size: 0.85em; margin-left: auto; }
  .queue-field { margin: 4px 0; }
  .queue-field .label {
    display: inline-block;
    min-width: 90px;
    color: #4b5266;
    font-weight: 600;
    font-size: 0.9em;
  }
  .queue-preview { margin-top: 10px; }
  .queue-preview .label { display: block; margin-bottom: 4px; }
  .queue-card-actions {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Chunk 11.2: first-time-login instructions overlay. Backdrop +
     centered card matching the .complete-modal family aesthetic but
     with a wider modal (the long copy + two screenshots fit awkwardly
     in 560px) and internal scroll for the content. Two action paths
     at the bottom: primary button "Got it, sign me in" and a subtle
     skip-link "Skip instructions next time" (both set the
     localStorage flag; only the primary triggers the auth flow).
     See ui/Login.html and Layout.html's INSTRUCTIONS_FLAG_KEY_ for
     wiring. */
  .instructions-overlay {
    position: fixed;
    inset: 0;
    background: rgba(29, 35, 51, 0.55);
    z-index: 1300;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
    overflow-y: auto;
  }
  .instructions-modal {
    background: #fff;
    border-radius: 8px;
    padding: 24px 28px;
    width: min(720px, 100%);
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    color: var(--kd-fg-1);
  }
  .instructions-title {
    margin: 0 0 4px;
    font-size: 1.35em;
    color: var(--kd-primary);
  }
  .instructions-subhead {
    margin: 0 0 16px;
    font-size: 1em;
    font-weight: 500;
    color: var(--kd-fg-2);
  }
  .instructions-steps {
    margin: 0 0 18px;
    padding-left: 22px;
    line-height: 1.5;
    color: var(--kd-fg-1);
  }
  .instructions-steps li { margin-bottom: 6px; }
  .instructions-warning-heading {
    margin: 18px 0 6px;
    font-size: 1em;
    font-weight: 600;
    color: var(--kd-fg-1);
  }
  .instructions-warning-body {
    margin: 0 0 18px;
    line-height: 1.5;
    color: var(--kd-fg-2);
  }
  .instructions-figure {
    margin: 0 0 18px;
    padding: 12px;
    background: var(--kd-surface-alt);
    border: 1px solid var(--kd-border-soft);
    border-radius: 6px;
  }
  .instructions-screenshot {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    border: 1px solid var(--kd-border);
  }
  .instructions-figure figcaption {
    margin-top: 8px;
    font-size: 0.9em;
    color: var(--kd-fg-2);
  }
  .instructions-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
    padding-top: 14px;
    border-top: 1px solid var(--kd-border-soft);
    flex-wrap: wrap;
  }
  .instructions-go-btn {
    /* Adopt .btn but bump padding slightly so the action button feels
       weighty against the long copy above it. */
    padding: 10px 18px;
    font-size: 1em;
  }
  .instructions-skip-link {
    color: var(--kd-fg-2);
    font-size: 0.9em;
    text-decoration: none;
  }
  .instructions-skip-link:hover { text-decoration: underline; }

  /* Complete-confirmation modal (RequestsQueue). Overlay + centered
     card; Buildings checkbox group lets the manager adjust the seat's
     building_names before commit. */
  .complete-modal {
    position: fixed;
    inset: 0;
    background: rgba(29, 35, 51, 0.55);
    z-index: 1200;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .complete-modal.hidden { display: none; }
  .complete-modal-inner {
    background: #fff;
    border-radius: 8px;
    padding: 20px 24px;
    width: min(560px, 100%);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .complete-modal-inner h2 { margin: 0 0 12px; font-size: 1.15em; }
  .complete-modal-summary {
    background: #f3f5fa;
    border: 1px solid #d8dbe4;
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 14px;
  }
  .complete-modal-inner .form-row { margin-bottom: 14px; }
  .complete-modal-inner .form-row .label {
    display: block;
    margin-bottom: 6px;
    color: #1d2333;
  }
  .cm-buildings-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 260px;
    overflow-y: auto;
    padding: 8px 10px;
    border: 1px solid #d8dbe4;
    border-radius: 4px;
    background: #fff;
  }
  .cm-building-row {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 0.95em;
    color: #1d2333;
    cursor: pointer;
  }
  .cm-buildings-hint {
    margin-top: 6px;
    color: #4b5266;
    font-size: 0.85em;
  }
  .cm-buildings-empty {
    padding: 10px 12px;
    background: #fff8ea;
    border: 1px dashed #b76d00;
    border-radius: 4px;
    color: #5c4100;
    font-size: 0.9em;
  }
  .complete-modal-inner .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 14px;
  }

  /* Seat edit modal. */
  .seat-edit-modal {
    position: fixed;
    inset: 0;
    background: rgba(29, 35, 51, 0.55);
    z-index: 1200;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .seat-edit-modal.hidden { display: none; }
  .seat-edit-modal-inner {
    background: #fff;
    border-radius: 8px;
    padding: 20px 24px;
    width: min(560px, 100%);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .seat-edit-modal-inner h2 { margin: 0 0 12px; font-size: 1.15em; }
  .seat-edit-modal-inner .form-row { margin-bottom: 10px; }
  .seat-edit-modal-inner .form-row.temp-only { display: flex; gap: 14px; }
  .seat-edit-modal-inner .form-row.temp-only.hidden { display: none; }
  .seat-edit-modal-inner label { color: #4b5266; font-size: 0.9em; }
  .seat-edit-modal-inner input[type="text"],
  .seat-edit-modal-inner input[type="date"],
  .seat-edit-modal-inner textarea {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #c8ccd6;
    border-radius: 3px;
    font-family: inherit;
    font-size: inherit;
    box-sizing: border-box;
  }
  .seat-edit-modal-inner input[readonly] {
    background: #f3f5fa;
    color: #6b7280;
    cursor: not-allowed;
  }
  .seat-edit-modal-inner .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 14px;
  }

  /* Removal flow (Chunk 7): X/trashcan, removal-pending badge, remove
     confirmation modal, queue preview strikethrough. */
  .badge-removal-pending {
    background: #f5e4e4;
    color: #923834;
    margin-left: 6px;
