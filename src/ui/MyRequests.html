<!--
  My Requests (Chunk 6, TASKS.md #2 card migration). Single template
  shared between bishopric + stake principals.

  Scope filter UX (from the Chunk-6 prompt):
    - Single role   → no dropdown; directly shows the user's requests
      for that scope.
    - Multi-role    → scope-filter dropdown including an "All" option
      (empty string on the wire).

  Row rendering: card-per-row using the shared .roster-card /
  .roster-card-line1 / .roster-card-line2 classes so the visual density
  matches the roster pages. Status drives the card background via
  .my-request-card.status-row-* (mirrors the RequestsQueue status
  colouring convention).

  Actions: Cancel button appears on pending rows only; confirms then
  calls ApiRequests_cancel. After success, the row flips to cancelled
  in place (full refresh of the list). Rejected rows carry a "why?"
  hint; completed remove-requests that hit the R-1 race carry a "note"
  hint — click either to see the reason / completion_note.
-->
<section class="my-requests-page">
  <h1>My Requests</h1>
  <div id="scope-filter-host"></div>
  <div id="my-requests-host"><div class="empty-state">Loading your requests…</div></div>
</section>

<script>
(function () {
  // Chunk 10.6: pane-scoped $.
  var __pane = null;
  function $(id) { return (__pane || document).querySelector('#' + id); }

  var allowedScopes = [];
  var selectedScope = '';   // '' means "All" for multi-role

  function setupScopeFilter() {
    var host = $('scope-filter-host');
    if (allowedScopes.length <= 1) {
      if (allowedScopes.length === 1) {
        host.innerHTML = '<div class="requesting-for"><strong>Scope:</strong> ' +
          escapeHtml(allowedScopes[0].label) + '</div>';
      } else {
        host.innerHTML = '';
      }
      return;
    }
    var html = '<div class="requesting-for"><label><strong>Scope:</strong> ' +
      '<select id="f-scope"><option value="">All</option>';
    for (var i = 0; i < allowedScopes.length; i++) {
      html += '<option value="' + escapeHtml(allowedScopes[i].scope) + '">' +
                escapeHtml(allowedScopes[i].label) + '</option>';
    }
    html += '</select></label></div>';
    host.innerHTML = html;
    $('f-scope').addEventListener('change', function () {
      selectedScope = this.value;
      load();
    });
  }

  function statusBadge(status) {
    return '<span class="status-badge status-' + escapeHtml(status) + '">' +
             escapeHtml(status) + '</span>';
  }

  function typeLabel(type) {
    if (type === 'add_manual') return 'Add (manual)';
    if (type === 'add_temp')   return 'Add (temp)';
    if (type === 'remove')     return 'Remove';
    return String(type);
  }

  // Card shape mirrors rosterCardHtml but breaks out dedicated lines
  // per request-level field so long text wraps predictably:
  //   Line 1: [type-badge][status-badge] · [scope] · Member (email) ·
  //           actions (right-aligned)
  //   Line 2: Dates: ...       (add_temp only)
  //   Line 3: Reason: ...
  //   Line 4: Comment: ...     (only when the requester left a comment)
  //   Line 5: Requested · Resolved (bottom — timestamps anchor the card)
  // Missing lines collapse silently.
  function rowHtml(row) {
    var type = row.type;
    var typeBadge = '<span class="roster-badge badge-request-' + escapeHtml(type) + '">' +
      escapeHtml(typeLabel(type)) + '</span>';
    var statusBadgeHtml = statusBadge(row.status);

    var memberInner = row.member_name
      ? '<span class="roster-card-name">' + escapeHtml(row.member_name) + '</span>' +
        ' (<span class="roster-email">' + escapeHtml(row.member_email) + '</span>)'
      : '<span class="roster-email">' + escapeHtml(row.member_email) + '</span>';
    var memberHtml = '<span class="roster-card-member">' + memberInner + '</span>';

    var datesLine = '';
    if (type === 'add_temp' && (row.start_date || row.end_date)) {
      var s = row.start_date ? escapeHtml(row.start_date) : '?';
      var e = row.end_date   ? escapeHtml(row.end_date)   : '?';
      datesLine =
        '<div class="roster-card-line2">' +
          '<span class="roster-card-chip"><span class="label">Dates:</span> ' +
            s + ' → ' + e +
          '</span>' +
        '</div>';
    }

    var commentLine = row.comment
      ? '<div class="roster-card-line2">' +
          '<span class="roster-card-chip"><span class="label">Comment:</span> ' +
            escapeHtml(row.comment) +
          '</span>' +
        '</div>'
      : '';

    var actions = '';
    if (row.status === 'pending') {
      actions = '<button class="btn btn-secondary" data-act="cancel" data-request-id="' +
        escapeHtml(row.request_id) + '">Cancel</button>';
    } else if (row.status === 'rejected' && row.rejection_reason) {
      actions = '<span class="rejection-reason-hint" title="' +
        escapeHtml(row.rejection_reason) + '">why?</span>';
    } else if (row.status === 'complete' && row.completion_note) {
      // Chunk 7: surface the R-1 no-op note ("Seat already removed at
      // completion time") so a requester who got a "done" email isn't
      // confused that nothing visibly changed on the roster.
      actions = '<span class="completion-note-hint" title="' +
        escapeHtml(row.completion_note) + '">note</span>';
    }
    var actionsBlock = actions
      ? '<span class="roster-card-actions">' + actions + '</span>'
      : '';

    var reasonLine = row.reason
      ? '<div class="roster-card-line2">' +
          '<span class="roster-card-chip"><span class="label">Reason:</span> ' +
            escapeHtml(row.reason) +
          '</span>' +
        '</div>'
      : '';
    // Timestamps anchor the card bottom. "Resolved:" is a neutral label
    // — the status badge on line 1 already says which terminal state it
    // landed in, so no need for status-specific wording.
    var requestedChip = row.requested_at
      ? '<span class="roster-card-chip"><span class="label">Requested:</span> ' +
          escapeHtml(row.requested_at) + '</span>'
      : '';
    var completedChip = row.completed_at
      ? '<span class="roster-card-chip"><span class="label">Resolved:</span> ' +
          escapeHtml(row.completed_at) + '</span>'
      : '';
    var timestampsLine = (requestedChip || completedChip)
      ? '<div class="roster-card-line2 roster-card-timestamps">' +
          requestedChip + completedChip +
        '</div>'
      : '';

    return '<div class="roster-card my-request-card status-row-' + escapeHtml(row.status) +
           '" data-request-id="' + escapeHtml(row.request_id) + '">' +
      '<div class="roster-card-line1">' +
        '<span class="roster-card-badges">' + typeBadge + statusBadgeHtml + '</span>' +
        '<span class="roster-card-chip roster-card-scope"><code>' + escapeHtml(row.scope) + '</code></span>' +
        memberHtml +
        actionsBlock +
      '</div>' +
      datesLine +
      reasonLine +
      commentLine +
      timestampsLine +
    '</div>';
  }

  function render(rows) {
    if (!rows || rows.length === 0) {
      $('my-requests-host').innerHTML =
        '<div class="empty-state">No requests yet.</div>';
      return;
    }
    var html = '<div class="roster-cards">';
    for (var i = 0; i < rows.length; i++) html += rowHtml(rows[i]);
    html += '</div>';
    $('my-requests-host').innerHTML = html;

    Array.prototype.forEach.call(
      $('my-requests-host').querySelectorAll('button[data-act="cancel"]'),
      function (btn) {
        btn.addEventListener('click', function () {
          var reqId = btn.getAttribute('data-request-id');
          if (!confirm('Cancel this pending request?')) return;
          btn.disabled = true;
          rpc('ApiRequests_cancel', reqId).then(function (resp) {
            toast('Request cancelled.', 'success');
            if (resp && resp.warning) toast(resp.warning, 'warn');
            load();
          }).catch(function (err) {
            toast(err.message || String(err), 'error');
            btn.disabled = false;
          });
        });
      }
    );

    // Reveal rejection reason on hover (mobile doesn't have hover, but
    // click also works on mobile). Click opens an alert with the reason.
    Array.prototype.forEach.call(
      $('my-requests-host').querySelectorAll('.rejection-reason-hint'),
      function (el) {
        el.addEventListener('click', function () {
          alert(el.getAttribute('title') || '(no reason given)');
        });
      }
    );

    // Same affordance for the completion_note (R-1 no-op note).
    Array.prototype.forEach.call(
      $('my-requests-host').querySelectorAll('.completion-note-hint'),
      function (el) {
        el.addEventListener('click', function () {
          alert(el.getAttribute('title') || '(no note)');
        });
      }
    );
  }

  function load() {
    $('my-requests-host').innerHTML = '<div class="empty-state">Loading your requests…</div>';
    rpc('ApiRequests_listMy', selectedScope || null).then(function (resp) {
      allowedScopes = resp.scopes || [];
      if ($('scope-filter-host').innerHTML === '') setupScopeFilter();
      render(resp.rows);
    }).catch(function (err) {
      $('my-requests-host').innerHTML =
        '<div class="error">Could not load your requests: ' + escapeHtml(err.message || err) + '</div>';
    });
  }

  // Exported entry point (Chunk 10.6). First load also sets up the
  // scope filter after allowedScopes comes back from the server.
  window.page_my_init = function (pageModel, queryParams, pane) {
    __pane = pane;
    rpc('ApiRequests_listMy').then(function (resp) {
      allowedScopes = resp.scopes || [];
      setupScopeFilter();
      render(resp.rows);
    }).catch(function (err) {
      $('my-requests-host').innerHTML =
        '<div class="error">Could not load your requests: ' + escapeHtml(err.message || err) + '</div>';
    });
  };
})();
</script>
