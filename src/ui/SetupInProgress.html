<!--
  Shown to any signed-in user who is NOT the bootstrap admin while
  Config.setup_complete is still FALSE. Deliberately distinct from
  NotAuthorized: the user isn't unauthorised, the app isn't ready yet.

  No sign-out button. Refreshing won't help, and telling the user to
  sign out is misleading — their sign-in is fine, they just can't do
  anything until the admin finishes setup.

  Once Config.setup_complete flips to TRUE, the server-side gate in
  ApiShared_bootstrap skips this template and the user's next page load
  lands on the normal role-resolution path.
-->
<section class="setup-in-progress">
  <h1>Setup in progress</h1>
  <p>
    The Kindoo Access Tracker for this stake is still being configured.
    You're signed in as <code><?= email ?></code>, but there's nothing to
    do here yet.
  </p>
  <p>
    <? if (admin_email) { ?>
      Check back later, or contact your administrator
      (<code><?= admin_email ?></code>).
    <? } else { ?>
      Check back later, or contact your administrator.
    <? } ?>
  </p>
</section>
