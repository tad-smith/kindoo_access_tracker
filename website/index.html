<!DOCTYPE html>
<!--
  Kindoo Access Tracker — custom-domain wrapper.

  Hosted on GitHub Pages, served at https://kindoo.csnorth.org. A single
  full-viewport iframe loads the Main Apps Script /exec deployment, which
  must be served with HtmlService.XFrameOptionsMode.ALLOWALL on every
  doGet return path (Main.gs + identity-project/Code.gs).

  Net effect: users see kindoo.csnorth.org in the address bar and the
  Apps Script "This application was created by a Google Apps Script user"
  banner is hidden, because the banner lives in script.google.com's outer
  wrapper page — which we no longer load at the top frame.

  The inline script does three things, all same-origin DOM only on this
  origin:

    1. Forwards the wrapper's query string to the iframe src, so deep
       links (?p=mgr/seats&ward=CO) reach Main's doGet whether the user
       arrived cold or post-sign-in.

    2. After auth, when the wrapper lands at /?token=<HMAC>&redirect=<encoded>
       (Identity's Continue redirect target), extracts the token and the
       redirect, sanitizes the redirect (drops any nested 'token' or
       'redirect' to defend against hostile values), routes the token
       into the iframe URL only, and history.replaceState's the wrapper's
       URL to /?<cleanedQuery>. Result: the address bar never shows the
       token (it stays inside Apps Script's nested-iframe structure where
       it isn't user-visible), and the original deep-link query is
       restored.

    3. Holds the Chunk-11.2 first-time-login-instructions flag at the
       wrapper origin (kindoo.csnorth.org), as a plain document.cookie
       value. The iframe's *.googleusercontent.com origin can't reliably
       persist storage across visits (n-<hash> rotates per Apps Script
       execution; third-party storage may also be partitioned), so the
       flag lives here. Critically: the cookie is WRITTEN exactly once,
       at the moment the wrapper sees a ?token= in its own URL — i.e.,
       Identity's post-auth Continue redirect just landed. That's the
       definitive "user has completed sign-in at least once" signal,
       and it's the only signal the wrapper needs. The iframe never
       writes the cookie (no postMessage bridge to maintain). On every
       subsequent load, the wrapper reads the cookie and bridges the
       value into the iframe via &xinst=1, which Main.doGet consumes
       and injects into Layout as INSTRUCTIONS_SEEN — the iframe just
       reads a server-rendered boolean and toggles the overlay.

  See docs/runbooks/chunk-11-custom-domain.md for the deploy steps and
  docs/changelog/chunk-11.2-first-time-instructions.md for the cookie
  mechanism.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kindoo Access Tracker</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="shortcut icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe id="app" title="Kindoo Access Tracker" allow="clipboard-read; clipboard-write"></iframe>
  <script>
    (function () {
      var BASE = 'https://script.google.com/macros/s/AKfycbz6bJUZ5q9RMh8pjk2H2v5-LWGFRXDmutIfgBnMr27GlzKbGZi6Rv3Ga88GzitDr9QP_g/exec';
      var INSTRUCTIONS_FLAG = 'kindooLoginInstructionsV1Seen';
      var INSTRUCTIONS_FLAG_MAX_AGE = 60 * 60 * 24 * 365 * 5; // 5 years
      var iframe = document.getElementById('app');

      function readInstructionsFlag() {
        var cookies = (document.cookie || '').split(';');
        var prefix = INSTRUCTIONS_FLAG + '=';
        for (var i = 0; i < cookies.length; i++) {
          var c = cookies[i].replace(/^\s+/, '');
          if (c.indexOf(prefix) === 0) return c.substring(prefix.length);
        }
        return null;
      }

      function writeInstructionsFlag() {
        try {
          document.cookie = INSTRUCTIONS_FLAG + '=1' +
            '; Path=/' +
            '; Max-Age=' + INSTRUCTIONS_FLAG_MAX_AGE +
            '; SameSite=Lax; Secure';
        } catch (e) { /* cookie write failed; overlay shows next visit */ }
      }

      // Build the iframe URL. Three branches: empty search (bare visit),
      // no-token search (cold deep-link forward), token+redirect (post-
      // auth: extract, sanitize, separate iframe URL from wrapper URL
      // via replaceState — and at the same moment, set the
      // instructions-seen cookie since the user just completed sign-in
      // for the first time in this browser).
      var search = window.location.search;
      var iframeParams;

      if (!search) {
        iframeParams = new URLSearchParams();
      } else {
        var topParams = new URLSearchParams(search);
        var token = topParams.get('token');
        if (!token) {
          // Cold deep-link: forward the wrapper's query verbatim.
          iframeParams = new URLSearchParams(search.slice(1));
        } else {
          // Post-auth landing. The user just completed sign-in — this is
          // the moment to mark the instructions as seen. Idempotent: a
          // user who lands here a second time just refreshes the cookie's
          // expiry, which is fine.
          writeInstructionsFlag();

          var rawRedirect = topParams.get('redirect') || '';
          var redirectParams = new URLSearchParams(rawRedirect);
          redirectParams.delete('token');     // never round-trip the token
          redirectParams.delete('redirect');  // never re-nest

          iframeParams = new URLSearchParams();
          iframeParams.set('token', token);
          redirectParams.forEach(function (value, key) {
            iframeParams.set(key, value);
          });

          var cleanedQuery = redirectParams.toString();
          history.replaceState({}, '', '/' + (cleanedQuery ? '?' + cleanedQuery : ''));
        }
      }

      // Append the instructions-seen bridge. Strip any inbound xinst
      // defensively (the wrapper is the source of truth — never trust an
      // incoming xinst from a deep-link or post-auth redirect), then set
      // from the wrapper's own cookie.
      iframeParams.delete('xinst');
      if (readInstructionsFlag() === '1') iframeParams.set('xinst', '1');

      var qs = iframeParams.toString();
      iframe.src = BASE + (qs ? '?' + qs : '');
    })();
  </script>
</body>
</html>
