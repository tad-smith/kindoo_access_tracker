<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Stake Building Access">
  <!-- Rounded blue field; rx scales proportionally with the existing 32-viewBox favicon (6/32 = 12/64). -->
  <rect width="64" height="64" rx="12" fill="#2b6cb0"/>

  <!-- Building: flat-roof rectangle, white stroke, no fill. A door + two windows ground it as a civic / institutional building rather than a house. The right window sits inset enough that the diagonal key shaft passes between the windows rather than through them. -->
  <g fill="none" stroke="#ffffff" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer walls + roof line with a slight overhang. -->
    <path d="M14 50 V26 H50 V50 Z"/>
    <path d="M11 26 H53"/>
    <!-- Door (centered). -->
    <rect x="28" y="40" width="8" height="10"/>
    <!-- Two windows flanking the door, narrowed so the key's diagonal shaft has visual breathing room between them. -->
    <rect x="19" y="32" width="6" height="5"/>
    <rect x="39" y="32" width="6" height="5"/>
  </g>

  <!--
    Key, rotated -45deg about the frame centre (32,32). Drawn
    horizontally first along y=32: bow on the left, shaft going right,
    bit teeth at the right tip. After the -45deg rotation the bow lands
    in the lower-left corner area and the bit lands in the upper-right
    corner area, with the shaft cutting diagonally across the building.
    A 2px field-blue outline around every white shape separates the key
    from the building's white stroke without introducing a third colour.
  -->
  <g transform="rotate(-45 32 32)">
    <!-- Bow: hollow round handle. Sits at the lower-left corner of the frame after rotation. -->
    <circle cx="9" cy="32" r="6.5" fill="#ffffff" stroke="#2b6cb0" stroke-width="2"/>
    <circle cx="9" cy="32" r="2.75" fill="#2b6cb0"/>
    <!-- Shaft from bow to bit. -->
    <rect x="14.5" y="29.75" width="33" height="4.5" fill="#ffffff" stroke="#2b6cb0" stroke-width="2" stroke-linejoin="round"/>
    <!-- Bit teeth: two notches stepping down on the bottom edge of the tip. -->
    <path d="M38 34.25 L38 38 L42 38 L42 34.25 Z" fill="#ffffff" stroke="#2b6cb0" stroke-width="2" stroke-linejoin="round"/>
    <path d="M44 34.25 L44 37 L47.5 37 L47.5 34.25 Z" fill="#ffffff" stroke="#2b6cb0" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>
